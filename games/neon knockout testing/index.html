// Background: animated neon grid (no horizon line)
  // ============================================================
  let tStart = now();
  function timeSec(){ return (now() - tStart) / 1000; }

  function drawNeonGrid(t){
    const horizon = H * 0.38; // used for perspective only (no visible line)
    const gridTop = horizon;
    const gridBottom = H + 120;

    ctx.save();
    ctx.fillStyle = COL_BG;
    ctx.fillRect(0, 0, W, H);

    // Vignette
    const g = ctx.createRadialGradient(W/2, H/2, 40, W/2, H/2, Math.max(W,H)*0.65);
    g.addColorStop(0, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(0,0,0,0.65)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 1.0;
    const speed = 0.9;
    const z = (t * speed) % 1;

    // Horizontal lines (perspective)
    const horizCount = PERF.gridHoriz;
    for (let i = 0; i < horizCount; i++){
      const p = (i + z) / horizCount;
      const y = lerp(gridTop, gridBottom, p*p);
      const alpha = clamp(0.44 - p*0.34, 0.08, 0.34);
      ctx.strokeStyle = `rgba(0,228,102,${alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Vertical lines converging to center
    const centerX = W/2;
    const n = PERF.gridVert;
    for (let i = -n; i <= n; i++){
      const x0 = centerX + i * 38;
      const x1 = centerX + i * 240;
      ctx.strokeStyle = "rgba(0,228,102,0.22)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x0, gridBottom);
      ctx.lineTo(x1, gridTop);
      ctx.stroke();
    }

    // broad glow wash to intensify neon bloom
    const ng = ctx.createLinearGradient(0, gridTop, 0, gridBottom);
    ng.addColorStop(0, "rgba(0,228,102,0.00)");
    ng.addColorStop(0.45, "rgba(0,228,102,0.04)");
    ng.addColorStop(1, "rgba(0,228,102,0.12)");
    ctx.fillStyle = ng;
    ctx.fillRect(0, gridTop, W, gridBottom - gridTop);

    ctx.restore();
  }

  // ============================================================

  function drawTitle(y, text){
    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const titleKey = String(text || "").trim().toUpperCase();
    const mainTitle = (titleKey === "NEON KNOCKOUT");
    const displayText = mainTitle ? "Neon knockout" : text;
    const phoneLandscape = isPhoneLandscapeViewport();
    const phonePortrait = isPhoneViewport() && !phoneLandscape;

    if (mainTitle){
      // Neon-sign style title inspired by reference image.
      const pulse = 0.86 + 0.14 * Math.sin(now() * 0.0038);
      const titleSize = phoneLandscape
        ? Math.floor(clamp(Math.min(W * 0.078, H * 0.18), 30, 48))
        : phonePortrait
        ? Math.floor(clamp(Math.min(W * 0.095, H * 0.12), 36, 56))
        : (isShortViewport() || isPhoneViewport())
        ? Math.floor(clamp(Math.min(W * 0.11, H * 0.14), 42, 68))
        : 72;
      ctx.font = `500 ${titleSize}px "Trebuchet MS", "Segoe UI", sans-serif`;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      // Tube silhouette (outer glow)
      ctx.globalAlpha = 0.90;
      ctx.strokeStyle = "rgba(92,248,136,0.95)";
      ctx.lineWidth = 3.8;
      ctx.shadowColor = "rgba(76,235,124,0.86)";
      ctx.shadowBlur = 22 * pulse;
      ctx.strokeText(displayText, W/2, y);

      // Hot neon core
      ctx.globalAlpha = 1;
      ctx.fillStyle = "rgba(168,255,188,0.97)";
      ctx.shadowColor = "rgba(88,244,138,0.88)";
      ctx.shadowBlur = 14 * pulse;
      ctx.fillText(displayText, W/2, y);

    } else {
      ctx.font = "800 52px ui-monospace, Menlo, Consolas, monospace";

      // Outer neon bloom

  function beginRevealThenExecute(){
    // Trigger a brief reveal (show BOTH teams' planned arrows), then resolve movement.
    if (state !== State.GAME) return;
    if (game.phase !== "plan") return;

    if (isSinglePlayerMode()){
      if (!allPlansReadyFor(game.team1)) return;
      // Precompute AI targets so they are visible during reveal.
      aiPlanTargets();
      game.aiPlannedThisTurn = true;
    } else {
      // In two-player mode we only reveal after Player 2 has set plans.
      if (!game.p1Ready) return;
      if (!allPlansReadyFor(game.team2)) return;
    }

    revealActive = true;
    revealPending = true;
    revealTimer = REVEAL_DURATION;
    beep(920, 0.03, "square", 0.02);
  }

  function drawVolumeSliderRow(x, y, label, value, rowW=340){
    ctx.save();
    ctx.font = "16px ui-monospace, Menlo, Consolas, monospace";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillStyle = COL_TEXT;

    const labelY = y - 14;
    const trackW = Math.min(240, rowW - 116);
    const trackH = 10;
    const trackX = x + Math.max(0, (rowW - trackW) * 0.5);
    const trackY = y + 8;
    const knobX = trackX + trackW * clamp(value, 0, 1);
    const pct = Math.round(clamp(value, 0, 1) * 100);

    ctx.fillText(label, trackX, labelY);
    ctx.textAlign = "right";
    ctx.font = "13px ui-monospace, Menlo, Consolas, monospace";
    ctx.fillStyle = pct > 0 ? "rgba(0,255,152,0.92)" : "rgba(180,205,194,0.72)";
    ctx.fillText(`${pct}%`, trackX + trackW, labelY);

    roundRect(ctx, trackX, trackY, trackW, trackH, 999);
    ctx.fillStyle = "rgba(0,0,0,0.42)";
    ctx.fill();
    ctx.strokeStyle = "rgba(0,228,102,0.34)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const fillW = Math.max(0, knobX - trackX);
    if (fillW > 0){
      ctx.save();
      roundRect(ctx, trackX, trackY, fillW, trackH, 999);
      const grad = ctx.createLinearGradient(trackX, trackY, trackX + trackW, trackY);
      grad.addColorStop(0, "rgba(0,228,102,0.38)");
      grad.addColorStop(0.55, "rgba(0,255,152,0.78)");
      grad.addColorStop(1, "rgba(155,255,214,0.95)");
      ctx.fillStyle = grad;
      ctx.shadowColor = "rgba(0,228,102,0.55)";
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.fillStyle = "rgba(220,255,242,0.95)";
    ctx.shadowColor = "rgba(0,228,102,0.82)";
    ctx.shadowBlur = 14;
    ctx.arc(knobX, trackY + trackH * 0.5, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    return {
      x: trackX - 8,
      y: labelY - 12,
      w: trackW + 16,
      h: 46,
      trackX,
      trackY,
      trackW,
      trackH
    };
  }
  function drawToggleRow(x, y, label, value, rowW=340){
    ctx.save();
    ctx.font = "16px ui-monospace, Menlo, Consolas, monospace";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillStyle = COL_TEXT;

    const pillW = 84, pillH = 28;
    const rowGap = 18;
    const labelW = Math.ceil(ctx.measureText(label).width);
    const rowInnerW = labelW + rowGap + pillW;
    const rowX = x + Math.max(0, (rowW - rowInnerW) * 0.5);
    const px = rowX + labelW + rowGap;
    const py = y - pillH / 2;

    ctx.fillText(label, rowX, y);
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.strokeStyle = value ? "rgba(0,228,102,0.9)" : "rgba(0,228,102,0.35)";
    ctx.lineWidth = 2;
    ctx.shadowColor = "rgba(0,228,102,0.7)";
    ctx.shadowBlur = value ? 14 : 8;
    roundRect(ctx, px, py, pillW, pillH, 999);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.stroke();

    const knobR = 10;
    const kx = value ? (px + pillW - 16) : (px + 16);
    const ky = py + pillH/2;
    ctx.beginPath();
    ctx.fillStyle = value ? COL_NEON : "rgba(217,255,239,0.55)";
    ctx.shadowColor = value ? "rgba(0,228,102,0.85)" : "rgba(217,255,239,0.25)";
    ctx.shadowBlur = value ? 14 : 6;
    ctx.arc(kx, ky, knobR, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    return { x: rowX, y: py, w: rowInnerW, h: pillH };
  }
  function drawColorChoiceChip(x, y, w, h, preset, selected, locked){
    ctx.save();

    roundRect(ctx, x, y, w, h, 10);

    ctx.shadowColor = locked ? "rgba(0,0,0,0)" : preset.shadow;

    ctx.shadowBlur = 0;

    const dotX = x + 16;
    const dotY = y + h / 2;
    ctx.globalAlpha = locked ? 0.40 : 1;

    ctx.shadowColor = preset.shadow;
    ctx.shadowBlur = locked ? 0 : 10;
    ctx.beginPath();
    ctx.arc(dotX, dotY, 8.5, 0, TAU);

    ctx.textAlign = "left";

    ctx.restore();
    return { x, y, w, h };
  }

  // ============================================================
  // Gameplay: update
  // ============================================================
  function applyFriction(u, simMul=1){
    const tune = getPhysicsTuning();
    const f = Math.pow(tune.friction, Math.max(1, simMul));
    u.vx *= f;
    u.vy *= f;
    if (Math.abs(u.vx) < tune.minSpeed) u.vx = 0;
    if (Math.abs(u.vy) < tune.minSpeed) u.vy = 0;
  }

  function swapToPlayer2Plan(){
    game.planOwner = 2;
    game.selected = -1;
  }

  
  function stepUnitWithWalls(u, dt){
    // dt is in "frames" (because main sim uses dt*60). We sub-step so the unit can't jump through thin walls.
    const speed = Math.hypot(u.vx, u.vy);
    const maxStepDist = Math.max(4, u.r * 0.45);
    const steps = clamp(Math.ceil((speed * dt) / maxStepDist), 1, 14);
    const sdt = dt / steps;

    for (let i=0; i<steps; i++){
      u.x += u.vx * sdt;
      u.y += u.vy * sdt;

      if (game.walls && game.walls.length){
        for (const w of game.walls){
          resolveCircleRectCollision(u, w);

          // Safeguard: if still inside expanded wall bounds, snap to nearest edge.
          const ex0 = w.x - u.r, ex1 = w.x + w.w + u.r;
          const ey0 = w.y - u.r, ey1 = w.y + w.h + u.r;
          if (u.x >= ex0 && u.x <= ex1 && u.y >= ey0 && u.y <= ey1){
            const dl = Math.abs(u.x - ex0);
            const dr = Math.abs(ex1 - u.x);
            const dtp = Math.abs(u.y - ey0);
            const db = Math.abs(ey1 - u.y);
            const m = Math.min(dl, dr, dtp, db);
            if (m === dl){ u.x = ex0; if (u.vx < 0) u.vx *= -0.6; }
            else if (m === dr){ u.x = ex1; if (u.vx > 0) u.vx *= -0.6; }
            else if (m === dtp){ u.y = ey0; if (u.vy < 0) u.vy *= -0.6; }
            else { u.y = ey1; if (u.vy > 0) u.vy *= -0.6; }
          }
        }
      }
    }
  }

function updateGameplay(dt){
    if (state !== State.GAME) return;
    const simMul = speedMultiplier();

    // First-run onboarding must be dismissed with a click/tap before play starts.
    if (onboarding.active){
      if (input.justDown || input.justUp){
        dismissOnboarding();
        clickSound();
      }
      ui.pressed = null;
      input.justDown = false;
      input.justUp = false;
      return;
    }

    // Multiplayer privacy gate (local multiplayer)
    if (usesPrivacyGate() && game.gate !== 0){
      // Wait for click/tap to begin the correct player\'s planning turn.
      // While gated: hide plans and block all planning input.
      if (game.gateHold > 0){
        game.gateHold = Math.max(0, game.gateHold - dt);
      } else if (input.justDown){
        clearPlayerGate();
        beep(640, 0.04, "square", 0.03);
      }
      ui.pressed = null;
      input.justDown = false;
      input.justUp = false;
      return;
    }

    
    // Reveal phase: show BOTH teams' planned arrows for a moment, then resolve.
    if (revealActive){
      revealTimer -= dt * simMul;
      if (revealTimer <= 0){
        revealActive = false;
        if (revealPending){
          revealPending = false;
          if (isDoorsStage()) applyDoorsStageForResolve();
          beginResolve();
        }
      }
      // During reveal, block planning input & selection.
      ui.pressed = null;
      input.justDown = false;
      input.justUp = false;
      return;
    }

// Planning input
    if (game.phase === "plan"){
      const team = activePlanningTeam();

      if (input.justDown){
        // ignore if UI pressed (Execute/Clear etc.)
        if (!ui.pressed){
          const mx = input.x, my = input.y;

          // select a living unit
          let picked = -1;
          for (let i = 0; i < team.length; i++){
            const u = team[i];
            if (!u.alive) continue;
            const dx = mx - u.x, dy = my - u.y;
            if (dx*dx + dy*dy <= (u.r + 10)*(u.r + 10)){
              picked = i;
              break;
            }
          }

          if (picked !== -1){
            game.selected = picked;
            beep(620, 0.03, "square", 0.025);
          } else if (game.selected !== -1){
            const u = team[game.selected];
            if (u && u.alive){
              const dx = mx - u.x, dy = my - u.y;
              const n = normalize(dx, dy);
              const dist = clamp(Math.hypot(dx, dy), 0, game.maxMoveDist);

              const tx = u.x + n.x * dist;
              const ty = u.y + n.y * dist;

              const fx = tx, fy = ty;

              u.target = { x: fx, y: fy };
              beep(420 + (dist / game.maxMoveDist) * 240, 0.04, "triangle", 0.03);

              // auto-advance within active team
              let next = -1;
              for (let i = 0; i < team.length; i++){
                const j = (game.selected + 1 + i) % team.length;
                const v = team[j];
                if (v.alive && !v.target){ next = j; break; }
              }
              game.selected = next;
            }
          } else {
            game.selected = -1;
          }
        }
      }
    }

    // Resolve phase physics
    
    // Keep AI targets stage-safe even if setup changes between frames.
    if (isSinglePlayerMode() && game.phase === "plan"){
      const diffBase = DIFF[config.difficulty] || DIFF.NORMAL;
      const aiMod = getAIModifierTuning();
      const diff = {
        ...diffBase,
        edgeSafety: clamp(diffBase.edgeSafety + aiMod.edgeSafetyAdd, 0, 1),
        circleSafety: clamp(diffBase.circleSafety + aiMod.edgeSafetyAdd * 0.9, 0, 1)
      };
      for (const u of game.team2){
        if (!u.alive || !u.target) continue;
        if (isFootballMode() || isHockeyMode()){
          const safe = findAIMoveTarget(u, u.target.x, u.target.y);
          u.target.x = safe.x;
          u.target.y = safe.y;
        } else {
          let safe = findAIMoveTarget(u, u.target.x, u.target.y);
          safe = applyAICircleSafety(u, safe, diff);
          u.target.x = safe.x;
          u.target.y = safe.y;
        }
      }
    }

if (game.phase === "resolve"){
      const all = [...game.team1, ...game.team2];
      game.turnT += dt * simMul;

      // Turn-based motion: velocities are set once in executePlan() (initial impulse).
      // After that it’s pure momentum + friction + collisions (no continuous steering/pulling).

      // Integrate (sub-stepped when walls exist to prevent tunneling)
      for (const u of all){
        if (!u.alive) continue;
        if (game.walls && game.walls.length){
          stepUnitWithWalls(u, dt * 60 * simMul);
        } else {
          u.x += u.vx * dt * 60 * simMul;
          u.y += u.vy * dt * 60 * simMul;
        }
        if (isFootballMode() || isHockeyMode()){
          constrainFootballUnit(u);
        }
        applyFriction(u, simMul);
      }

// Collisions
      let intensity = 0;
      let bumperIntensity = 0;
      let bodyIntensity = 0;
      if (game.bumpers && game.bumpers.length){
        for (let it=0; it<2 * simMul; it++){
          for (const u of all){
            if (!u.alive) continue;
            for (const b of game.bumpers){
              const hit = resolveCircleCollisionStatic(u, b);
              bumperIntensity = Math.max(bumperIntensity, hit);
              intensity = Math.max(intensity, hit);
            }
          }
        }
      }
      for (let it=0; it<4 * simMul; it++){
for (let i = 0; i < all.length; i++){
        const a = all[i];
        if (!a.alive) continue;
        for (let j = i + 1; j < all.length; j++){
          const b = all[j];
          if (!b.alive) continue;
          const hit = resolveCircleCollision(a, b);
          bodyIntensity = Math.max(bodyIntensity, hit);
          intensity = Math.max(intensity, hit);
        }
      }
}

      if (bumperIntensity > 0.08){
        bumperHitSound(bumperIntensity);
      }
      if (bodyIntensity > 0){
        const hitStrength = clamp(bodyIntensity, 0, 1);
        if (hitStrength >= 0.74) heavyKnockoutSmash(hitStrength);
        else impactSound(hitStrength);
      }

      if (isFootballMode()){
        if (carryBallResolveStep(all, dt * simMul)) return;
      } else if (isHockeyMode()){
        if (hockeyResolveStep(all, dt * simMul)) return;
      } else {
        if (isKeepAwayMode()){
          if (carryBallResolveStep(all, dt * simMul)) return;
        }
        // Eliminations
        const keepAwayCarrier = isKeepAwayMode() ? getFootballCarrierUnit() : null;
        let eliminatedCount = 0;
        for (const u of all){
          if (!u.alive) continue;
          if (!isOnPlatform(u)){
            u.alive = false;
            u.vx = u.vy = 0;
            u.target = null;
            eliminatedCount++;
            if (isKeepAwayMode() && keepAwayCarrier === u){
              // If the carrier is knocked off, drop/reset ball to center.
              setFootballCarrier(null);
              game.football.x = game.platform.cx;
              game.football.y = game.platform.cy;
              game.football.stealCooldown = 0.16;
              game.keepAway.streakTeam = 0;
              game.keepAway.streakCount = 0;
            }
          }
        }
        if (eliminatedCount > 0) fallOutSound(eliminatedCount);

        // Win condition
        const t1 = aliveCount(game.team1);
        const t2 = aliveCount(game.team2);
        if (t1 === 0 && t2 === 0){
          endRound("ai"); // edge case
          return;
        }
        if (t1 === 0){ endRound("ai"); return; }
        if (t2 === 0){ endRound("player"); return; }
      }

      // End resolve when window over & settled
      if (game.turnT > game.turnDur){
        let moving = false;
        for (const u of all){
          if (!u.alive) continue;
          if (Math.hypot(u.vx, u.vy) > 0.12){ moving = true; break; }
        }
      if (!moving){
        if (isKeepAwayMode()){
          if (resolveKeepAwayTurnWin()) return;
        }
        for (const u of all) u.target = null;
        game.phase = "plan";
        game.selected = -1;
        game.turnT = 0;
        game.aiPlannedThisTurn = false;

          // reset hotseat flow
          game.planOwner = 1;
          game.p1Ready = false;

          clearPlayerGate();
          if (usesPrivacyGate()){
	            beginPlayerGate(1, "PLAYER 1 START");
          }
        }
      }
    }

    input.justDown = false;
    input.justUp = false;
  }

  function drawPlatform(){
    const plat = game.platform;

    // Solid arena fill first so background/grid never bleeds through.
    ctx.save();
    if (plat.shape === "circle"){
      ctx.beginPath();
      ctx.arc(plat.cx, plat.cy, plat.radius, 0, TAU);
    } else {
      roundRect(ctx, plat.x, plat.y, plat.w, plat.h, 18);
    }
    ctx.fillStyle = COL_ARENA_FILL;
    ctx.fill();
    ctx.restore();

    if (plat.shape === "circle"){
      // neon rim + inner grid, clipped to circle
      ctx.save();
      ctx.beginPath();
      ctx.arc(plat.cx, plat.cy, plat.radius, 0, TAU);
      ctx.strokeStyle = COL_NEON;
      ctx.lineWidth = 3;
      ctx.shadowColor = COL_NEON;
      ctx.shadowBlur = 30;
      ctx.stroke();

      // outer halo ring (green, matching other arenas)
      ctx.beginPath();
      ctx.arc(plat.cx, plat.cy, plat.radius + 1, 0, TAU);
      ctx.strokeStyle = "rgba(0,228,102,0.34)";
      ctx.lineWidth = 8;
      ctx.shadowColor = "rgba(0,228,102,0.95)";
      ctx.shadowBlur = 26;
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.clip();

      // subtle inner grid
      ctx.globalAlpha = 0.11;
      ctx.strokeStyle = COL_NEON;
      ctx.lineWidth = 1;
      const step = 34;
      for (let y = plat.y + 16; y <= plat.y + plat.h - 16; y += step){
        ctx.beginPath(); ctx.moveTo(plat.x, y); ctx.lineTo(plat.x + plat.w, y); ctx.stroke();
      }
      for (let x = plat.x + 16; x <= plat.x + plat.w - 16; x += step){
        ctx.beginPath(); ctx.moveTo(x, plat.y); ctx.lineTo(x, plat.y + plat.h); ctx.stroke();
      }

      ctx.restore();
      return;
    }

    // default rectangular platform
    ctx.save();
    roundRect(ctx, plat.x, plat.y, plat.w, plat.h, 18);
    ctx.strokeStyle = COL_NEON;
    ctx.lineWidth = 3;
    ctx.shadowColor = COL_NEON;
    ctx.shadowBlur = 28;
    ctx.stroke();

    // soft outer halo
    roundRect(ctx, plat.x, plat.y, plat.w, plat.h, 18);
    ctx.strokeStyle = "rgba(0,228,102,0.30)";
    ctx.lineWidth = 7;
    ctx.shadowColor = "rgba(0,228,102,0.88)";
    ctx.shadowBlur = 24;
    ctx.stroke();
    ctx.shadowBlur = 0;

    if (isBridgesStage()){
      const rr = 18;
      const b = getBridgesStageData(plat);
      ctx.save();
      roundRect(ctx, plat.x, plat.y, plat.w, plat.h, rr);
      ctx.clip();

      // Split-floor layout with a lethal center trench.
      ctx.fillStyle = "rgba(0,228,102,0.06)";
      ctx.fillRect(b.left.x, b.left.y, b.left.w, b.left.h);
      ctx.fillRect(b.right.x, b.right.y, b.right.w, b.right.h);

      // Deep trench core.
      ctx.fillStyle = "rgba(0,0,0,0.985)";
      ctx.fillRect(b.pitX, b.pitY, b.pitW, b.pitH);

      // Hard trench lips with the same deep neon rim language as the arena border.
      const lipW = Math.max(12, Math.floor(b.pitW * 0.17));
      const leftLip = ctx.createLinearGradient(b.pitX - lipW, 0, b.pitX + 2, 0);
      leftLip.addColorStop(0, "rgba(0,228,102,0.04)");
      leftLip.addColorStop(0.55, "rgba(82,122,104,0.42)");
      leftLip.addColorStop(1, "rgba(10,18,16,0.92)");
      ctx.fillStyle = leftLip;
      ctx.fillRect(b.pitX - lipW, b.pitY, lipW, b.pitH);

      const rightLip = ctx.createLinearGradient(b.pitX + b.pitW - 2, 0, b.pitX + b.pitW + lipW, 0);
      rightLip.addColorStop(0, "rgba(10,18,16,0.92)");
      rightLip.addColorStop(0.45, "rgba(82,122,104,0.42)");
      rightLip.addColorStop(1, "rgba(0,228,102,0.04)");
      ctx.fillStyle = rightLip;
      ctx.fillRect(b.pitX + b.pitW, b.pitY, lipW, b.pitH);

      ctx.strokeStyle = COL_NEON;
      ctx.lineWidth = 3;
      ctx.shadowColor = COL_NEON;
      ctx.shadowBlur = 26;
      ctx.beginPath();
      ctx.moveTo(b.pitX, b.pitY);
      ctx.lineTo(b.pitX, b.pitY + b.pitH);
      ctx.moveTo(b.pitX + b.pitW, b.pitY);
      ctx.lineTo(b.pitX + b.pitW, b.pitY + b.pitH);
      ctx.stroke();

      ctx.strokeStyle = "rgba(0,228,102,0.30)";
      ctx.lineWidth = 7;
      ctx.shadowColor = "rgba(0,228,102,0.90)";
      ctx.shadowBlur = 22;
      ctx.beginPath();
      ctx.moveTo(b.pitX, b.pitY);
      ctx.lineTo(b.pitX, b.pitY + b.pitH);
      ctx.moveTo(b.pitX + b.pitW, b.pitY);
      ctx.lineTo(b.pitX + b.pitW, b.pitY + b.pitH);
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.strokeStyle = "rgba(0,228,102,0.10)";
      ctx.lineWidth = 1;
      for (let y = b.pitY + 20; y <= b.pitY + b.pitH - 20; y += 30){
        ctx.beginPath();
        ctx.moveTo(b.pitX + 6, y);
        ctx.lineTo(b.pitX + b.pitW - 6, y);
        ctx.stroke();
      }

      for (const bridge of b.bridges){
        // Dark catwalk bridge with neon rails instead of pale slabs.
        const bridgeFill = ctx.createLinearGradient(bridge.x, bridge.y, bridge.x, bridge.y + bridge.h);
        bridgeFill.addColorStop(0, "rgba(48,70,62,0.96)");
        bridgeFill.addColorStop(0.10, "rgba(24,34,30,0.98)");
        bridgeFill.addColorStop(0.50, "rgba(14,20,18,0.99)");
        bridgeFill.addColorStop(0.90, "rgba(24,34,30,0.98)");
        bridgeFill.addColorStop(1, "rgba(48,70,62,0.96)");
        ctx.fillStyle = bridgeFill;
        ctx.strokeStyle = "rgba(186,255,224,0.38)";
        ctx.lineWidth = 1.8;
        roundRect(ctx, bridge.x, bridge.y, bridge.w, bridge.h, 12);
        ctx.fill();
        ctx.stroke();

        // Outer rails.
        ctx.strokeStyle = "rgba(0,228,102,0.55)";
        ctx.lineWidth = 2.1;
        ctx.beginPath();
        ctx.moveTo(bridge.x + 10, bridge.y + 7);
        ctx.lineTo(bridge.x + bridge.w - 10, bridge.y + 7);
        ctx.moveTo(bridge.x + 10, bridge.y + bridge.h - 7);
        ctx.lineTo(bridge.x + bridge.w - 10, bridge.y + bridge.h - 7);
        ctx.stroke();

        // Deck seams.
        ctx.strokeStyle = "rgba(214,255,238,0.14)";
        ctx.lineWidth = 1;
        const panelStep = Math.max(14, Math.floor(bridge.w / 5));
        for (let x = bridge.x + panelStep; x < bridge.x + bridge.w; x += panelStep){
          ctx.beginPath();
          ctx.moveTo(x, bridge.y + 11);
          ctx.lineTo(x, bridge.y + bridge.h - 11);
          ctx.stroke();
        }

        // Thin center guide for the bridge lane.
        ctx.strokeStyle = "rgba(0,228,102,0.24)";
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.moveTo(bridge.x + 14, bridge.y + bridge.h * 0.5);
        ctx.lineTo(bridge.x + bridge.w - 14, bridge.y + bridge.h * 0.5);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(0,228,102,0.16)";
      ctx.lineWidth = 1;
      for (let y = plat.y + 18; y <= plat.y + plat.h - 18; y += 36){
        ctx.beginPath();
        ctx.moveTo(plat.x + 12, y);
        ctx.lineTo(b.pitX - 8, y);
        ctx.moveTo(b.pitX + b.pitW + 8, y);
        ctx.lineTo(plat.x + plat.w - 12, y);
        ctx.stroke();
      }
      ctx.restore();
    } else if (isDoorsStage()){
      const d = getDoorsStageData(plat);
      const openHalf = game.doors.openHalf;
      const closedDoor = openHalf === "TOP" ? d.botDoor : d.topDoor;
      ctx.save();
      roundRect(ctx, plat.x, plat.y, plat.w, plat.h, 18);
      ctx.clip();

      // Match the normal classic map: just draw the standard arena grid.
      ctx.globalAlpha = 0.11;
      ctx.strokeStyle = COL_NEON;
      ctx.lineWidth = 1;
      const step = 34;
      for (let y = plat.y + 16; y <= plat.y + plat.h - 16; y += step){
        ctx.beginPath();
        ctx.moveTo(plat.x, y);
        ctx.lineTo(plat.x + plat.w, y);
        ctx.stroke();
      }
      for (let x = plat.x + 16; x <= plat.x + plat.w - 16; x += step){
        ctx.beginPath();
        ctx.moveTo(x, plat.y);
        ctx.lineTo(x, plat.y + plat.h);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      const doorFill = ctx.createLinearGradient(closedDoor.x, closedDoor.y, closedDoor.x, closedDoor.y + closedDoor.h);
      doorFill.addColorStop(0, "rgba(40,64,56,0.96)");
      doorFill.addColorStop(0.14, "rgba(18,28,24,0.98)");
      doorFill.addColorStop(0.50, "rgba(8,14,12,0.995)");
      doorFill.addColorStop(0.86, "rgba(18,28,24,0.98)");
      doorFill.addColorStop(1, "rgba(40,64,56,0.96)");
      ctx.fillStyle = doorFill;
      roundRect(ctx, closedDoor.x, closedDoor.y, closedDoor.w, closedDoor.h, 4);
      ctx.fill();

      ctx.strokeStyle = "rgba(0,228,102,0.82)";
      ctx.lineWidth = 2.2;
      ctx.shadowColor = "rgba(0,228,102,0.82)";
      ctx.shadowBlur = 14;
      roundRect(ctx, closedDoor.x, closedDoor.y, closedDoor.w, closedDoor.h, 4);
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.strokeStyle = "rgba(0,228,102,0.20)";
      ctx.lineWidth = 1;
      const seamStep = Math.max(18, Math.floor(closedDoor.h / 5));
      for (let y = closedDoor.y + seamStep; y < closedDoor.y + closedDoor.h; y += seamStep){
        ctx.beginPath();
        ctx.moveTo(closedDoor.x + 8, y);
        ctx.lineTo(closedDoor.x + closedDoor.w - 8, y);
        ctx.stroke();
      }

      ctx.restore();
    } else if (isCurlingMode()){
      const c = game.curling;
      const rr = 18;
      ctx.save();
      roundRect(ctx, plat.x, plat.y, plat.w, plat.h, rr);
      ctx.clip();

      // Curling house rings: 5/7/8/10 points toward center.
      const rings = [
        { r: c.ring5, col: "rgba(0,228,102,0.18)", label: "5" },
        { r: c.ring7, col: "rgba(0,228,102,0.26)", label: "7" },
        { r: c.ring8, col: "rgba(255,255,255,0.20)", label: "8" },
        { r: c.ring10, col: "rgba(255,255,255,0.34)", label: "10" }
      ];
      for (const ring of rings){
        ctx.fillStyle = ring.col;
        ctx.strokeStyle = "rgba(255,255,255,0.55)";
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.arc(c.houseX, c.houseY, ring.r, 0, TAU);
        ctx.fill();
        ctx.stroke();
      }

      ctx.fillStyle = "rgba(255,255,255,0.88)";
      ctx.font = "11px ui-monospace, Menlo, Consolas, monospace";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      for (const ring of rings){
        ctx.fillText(ring.label, c.houseX + ring.r + 8, c.houseY);
      }

      ctx.restore();
    } else if (isHockeyMode()){
      const rr = 18;
      const g = hockeyGoalMouth(plat);

      // Soccer pitch lines (inside platform).
      ctx.save();
      roundRect(ctx, plat.x, plat.y, plat.w, plat.h, rr);
      ctx.clip();

      ctx.strokeStyle = "rgba(0,228,102,0.24)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      for (let i = 1; i <= 9; i++){
        const x = plat.x + (plat.w * i / 10);
        ctx.moveTo(x, plat.y + 4);
        ctx.lineTo(x, plat.y + plat.h - 4);
      }
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.70)";
      ctx.lineWidth = 2;
      ctx.strokeRect(plat.x + 8, plat.y + 8, plat.w - 16, plat.h - 16);

      ctx.strokeStyle = "rgba(0,228,102,0.46)";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(plat.cx, plat.y + 8);
      ctx.lineTo(plat.cx, plat.y + plat.h - 8);
      ctx.stroke();

      const centerR = Math.min(plat.h * 0.21, plat.w * 0.10);
      ctx.strokeStyle = "rgba(255,255,255,0.70)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(plat.cx, plat.cy, centerR, 0, TAU);
      ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.beginPath();
      ctx.arc(plat.cx, plat.cy, 2.2, 0, TAU);
      ctx.fill();

      const penaltyH = plat.h * 0.56;
      const penaltyY = plat.cy - penaltyH * 0.5;
      const penaltyW = plat.w * 0.16;
      const smallH = plat.h * 0.32;
      const smallY = plat.cy - smallH * 0.5;
      const smallW = plat.w * 0.08;

      ctx.strokeStyle = "rgba(255,255,255,0.58)";
      ctx.lineWidth = 1.8;
      ctx.strokeRect(plat.x + 8, penaltyY, penaltyW, penaltyH);
      ctx.strokeRect(plat.x + plat.w - 8 - penaltyW, penaltyY, penaltyW, penaltyH);
      ctx.strokeRect(plat.x + 8, smallY, smallW, smallH);
      ctx.strokeRect(plat.x + plat.w - 8 - smallW, smallY, smallW, smallH);
      ctx.restore();

      // Box-style goals (outside field, easy to identify).
      const goalDepth = Math.max(14, Math.floor(plat.w * 0.04));
      const mouthH = (g.bottom - g.top);
      const goalTop = g.top;
      const netSpacingX = Math.max(6, Math.floor(goalDepth / 3));
      const netSpacingY = Math.max(7, Math.floor(mouthH / 5));

      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.97)";
      ctx.lineWidth = 2.5;
      ctx.shadowColor = "rgba(255,255,255,0.95)";
      ctx.shadowBlur = 14;
      // Left goal frame
      ctx.strokeRect(plat.x - goalDepth, goalTop, goalDepth, mouthH);
      // Right goal frame
      ctx.strokeRect(plat.x + plat.w, goalTop, goalDepth, mouthH);

      // Mouth highlights where scoring happens.
      ctx.beginPath();
      ctx.moveTo(plat.x + 1.5, g.top);
      ctx.lineTo(plat.x + 1.5, g.bottom);
      ctx.moveTo(plat.x + plat.w - 1.5, g.top);
      ctx.lineTo(plat.x + plat.w - 1.5, g.bottom);
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(0,228,102,0.50)";
      ctx.lineWidth = 1.1;
      // Left goal net
      for (let x = plat.x - goalDepth + netSpacingX; x < plat.x; x += netSpacingX){
        ctx.beginPath(); ctx.moveTo(x, goalTop); ctx.lineTo(x, goalTop + mouthH); ctx.stroke();
      }
      for (let y = goalTop + netSpacingY; y < goalTop + mouthH; y += netSpacingY){
        ctx.beginPath(); ctx.moveTo(plat.x - goalDepth, y); ctx.lineTo(plat.x, y); ctx.stroke();
      }
      // Right goal net
      for (let x = plat.x + plat.w + netSpacingX; x < plat.x + plat.w + goalDepth; x += netSpacingX){
        ctx.beginPath(); ctx.moveTo(x, goalTop); ctx.lineTo(x, goalTop + mouthH); ctx.stroke();
      }
      for (let y = goalTop + netSpacingY; y < goalTop + mouthH; y += netSpacingY){
        ctx.beginPath(); ctx.moveTo(plat.x + plat.w, y); ctx.lineTo(plat.x + plat.w + goalDepth, y); ctx.stroke();
      }
      ctx.restore();
    } else if (isFootballMode()){
      const rr = 18;
      ctx.save();
      roundRect(ctx, plat.x, plat.y, plat.w, plat.h, rr);
      ctx.clip();

      const z = footballGoalLines(plat);

      // End zones.
      ctx.fillStyle = "rgba(0,228,102,0.08)";
      ctx.fillRect(plat.x, plat.y, z.ez, plat.h);
      ctx.fillRect(plat.x + plat.w - z.ez, plat.y, z.ez, plat.h);

      // Yard lines (vertical).
      ctx.strokeStyle = "rgba(0,228,102,0.20)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      for (let i = 1; i <= 9; i++){
        const x = plat.x + (plat.w * i / 10);
        ctx.moveTo(x, plat.y + 4);
        ctx.lineTo(x, plat.y + plat.h - 4);
      }
      ctx.stroke();

      // Goal lines.
      ctx.strokeStyle = "rgba(0,228,102,0.42)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(z.left, plat.y);
      ctx.lineTo(z.left, plat.y + plat.h);
      ctx.moveTo(z.right, plat.y);
      ctx.lineTo(z.right, plat.y + plat.h);
      ctx.stroke();

      // Center circle + center divider.
      const cr = Math.min(plat.h * 0.36, plat.w * 0.12);
      ctx.strokeStyle = "rgba(255,255,255,0.58)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(plat.cx, plat.cy, cr, 0, TAU);
      ctx.stroke();
      ctx.strokeStyle = "rgba(0,228,102,0.35)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(plat.cx, plat.y);
      ctx.lineTo(plat.cx, plat.y + plat.h);
      ctx.stroke();
      ctx.restore();
    } else {
      // default inner grid
      ctx.globalAlpha = 0.11;
      ctx.strokeStyle = COL_NEON;
      ctx.lineWidth = 1;
      const step = 34;
      for (let y = plat.y + 16; y <= plat.y + plat.h - 16; y += step){
        ctx.beginPath(); ctx.moveTo(plat.x, y); ctx.lineTo(plat.x + plat.w, y); ctx.stroke();
      }
      for (let x = plat.x + 16; x <= plat.x + plat.w - 16; x += step){
        ctx.beginPath(); ctx.moveTo(x, plat.y); ctx.lineTo(x, plat.y + plat.h); ctx.stroke();
      }
    }
    ctx.restore();
  }

    // Mid glow band to tighten the halo.
    ctx.shadowBlur = 16;
    ctx.lineWidth = 3.0;
    ctx.globalAlpha = 0.74;
    ctx.beginPath();
    ctx.arc(u.x, u.y, u.r + 0.2, 0, Math.PI*2);

function drawTargetMarker(tx, ty, color, alpha=1, dirX=1, dirY=0){
  // Arrowhead endpoint marker aligned with the plan direction.
  let len = Math.hypot(dirX, dirY);
  if (len < 1e-5){
    dirX = 1;
    dirY = 0;
    len = 1;
  }
  const nx = dirX / len;
  const ny = dirY / len;
  const px = -ny;
  const py = nx;

  const headLen = 13;
  const headW = 6.2;
  const stemLen = 9;

  const tipX = tx;
  const tipY = ty;
  const baseX = tipX - nx * headLen;
  const baseY = tipY - ny * headLen;

  const leftX = baseX + px * headW;
  const leftY = baseY + py * headW;
  const rightX = baseX - px * headW;
  const rightY = baseY - py * headW;

  const stemX = baseX - nx * stemLen;
  const stemY = baseY - ny * stemLen;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.4;
  ctx.lineCap = "round";

  // small stem so the arrow reads clearly as part of the line
  ctx.beginPath();
  ctx.moveTo(stemX, stemY);
  ctx.lineTo(baseX, baseY);
  ctx.stroke();

  // filled arrowhead
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(leftX, leftY);
  ctx.lineTo(rightX, rightY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

  function isPointInsideArenaForRender(x, y){
    const p = game.platform;
    if (p.shape === "circle"){
      const dx = x - p.cx, dy = y - p.cy;
      return (dx*dx + dy*dy) <= (p.radius * p.radius);
    }
    if (isBridgesStage()){
      return isInsideBridgesSurface(x, y);
    }
    return x >= p.x && x <= (p.x + p.w) && y >= p.y && y <= (p.y + p.h);
  }

  function getPlanRenderEndpoint(u){
    if (!u || !u.target) return null;
    const p = game.platform;
    const x1 = u.x, y1 = u.y;
    const x2 = u.target.x, y2 = u.target.y;

    if (isPointInsideArenaForRender(x2, y2)){
      return { x: x2, y: y2, showMarker: true };
    }

    const dx = x2 - x1;
    const dy = y2 - y1;
    if (Math.abs(dx) < 1e-6 && Math.abs(dy) < 1e-6){
      return { x: x1, y: y1, showMarker: false };
    }

    let tHit = 1;
    if (p.shape === "circle"){
      const sx = x1 - p.cx;
      const sy = y1 - p.cy;
      const r = p.radius;
      const A = dx*dx + dy*dy;
      const B = 2 * (sx*dx + sy*dy);
      const C = sx*sx + sy*sy - r*r;
      const disc = B*B - 4*A*C;
      if (A > 1e-8 && disc >= 0){
        const sd = Math.sqrt(disc);
        const t1 = (-B - sd) / (2 * A);
        const t2 = (-B + sd) / (2 * A);
        const cands = [];
        if (t1 >= 0 && t1 <= 1) cands.push(t1);
        if (t2 >= 0 && t2 <= 1) cands.push(t2);
        if (cands.length) tHit = Math.max(...cands);
      }
    } else {
      const left = p.x, right = p.x + p.w, top = p.y, bottom = p.y + p.h;
      const cands = [];
      if (Math.abs(dx) > 1e-8){
        const tl = (left - x1) / dx;
        const yl = y1 + tl * dy;
        if (tl >= 0 && tl <= 1 && yl >= top - 0.5 && yl <= bottom + 0.5) cands.push(tl);
        const tr = (right - x1) / dx;
        const yr = y1 + tr * dy;
        if (tr >= 0 && tr <= 1 && yr >= top - 0.5 && yr <= bottom + 0.5) cands.push(tr);
      }
      if (Math.abs(dy) > 1e-8){
        const tt = (top - y1) / dy;
        const xt = x1 + tt * dx;
        if (tt >= 0 && tt <= 1 && xt >= left - 0.5 && xt <= right + 0.5) cands.push(tt);
        const tb = (bottom - y1) / dy;
        const xb = x1 + tb * dx;
        if (tb >= 0 && tb <= 1 && xb >= left - 0.5 && xb <= right + 0.5) cands.push(tb);
      }
      if (cands.length) tHit = Math.min(...cands);
    }

    tHit = clamp(tHit, 0, 1);
    return { x: x1 + dx * tHit, y: y1 + dy * tHit, showMarker: false };
  }

  function drawPlanLines(){
    if (state !== State.GAME) return;
    if (game.phase !== "plan") return; // never show planning trails during execute/settle

    // If we're revealing, show ALL planned lines (both teams) regardless of mode/privacy.
    if (revealActive && game.phase === "plan"){
      const drawTeam = (team, pal) => {
        ctx.globalAlpha = 0.75;
        ctx.strokeStyle = pal.line;
        ctx.lineWidth = 2;
        ctx.shadowColor = pal.shadow;
        ctx.shadowBlur = 10;
        for (const u of team){
          if (!u.alive || !u.target) continue;
          const ep = getPlanRenderEndpoint(u);
          if (!ep) continue;
          ctx.beginPath();
          ctx.moveTo(u.x, u.y);
          ctx.lineTo(ep.x, ep.y);
          ctx.stroke();
          if (ep.showMarker) drawTargetMarker(ep.x, ep.y, pal.marker, 1, ep.x - u.x, ep.y - u.y);
        }
      };

      ctx.save();
      drawTeam(game.team1, getTeamPalette(1));
      drawTeam(game.team2, getTeamPalette(2));
      ctx.restore();
      return;
    }

    // MULTIPLAYER PRIVACY:
    // - During two-player plan phase, only show the CURRENT player's plans (never the opponent's).
    // - During gate screens or resolve, show no plans.
    if (usesPrivacyGate()){
      if (game.phase !== "plan" || game.gate !== 0) return;

      const showTeam = (game.planOwner === 1) ? game.team1 : game.team2;
      const pal = getTeamPalette((game.planOwner === 1) ? 1 : 2);
      const colLine = pal.line;
      const colShad = pal.shadow;
      const markerCol = pal.marker;

      ctx.save();
      for (const u of showTeam){
        if (!u.alive || !u.target) continue;
        const ep = getPlanRenderEndpoint(u);
        if (!ep) continue;
        ctx.globalAlpha = 0.60;
        ctx.strokeStyle = colLine;
        ctx.lineWidth = 2;
        ctx.shadowColor = colShad;
        ctx.shadowBlur = 8;

        ctx.beginPath();
        ctx.moveTo(u.x, u.y);
        ctx.lineTo(ep.x, ep.y);
        ctx.stroke();

        if (ep.showMarker){
          drawTargetMarker(ep.x, ep.y, markerCol, 0.74, ep.x - u.x, ep.y - u.y);
        }

        ctx.shadowBlur = 0;
      }
      ctx.restore();
      return;
    }

    // Single-player modes: show player's planned lines during planning only.
    const showTeam = game.team1;
    const p1Pal = getTeamPalette(1);
    ctx.save();
    for (const u of showTeam){
      if (!u.alive || !u.target) continue;
      const ep = getPlanRenderEndpoint(u);
      if (!ep) continue;
      ctx.globalAlpha = 0.60;
      ctx.strokeStyle = p1Pal.line;
      ctx.lineWidth = 2;
      ctx.shadowColor = p1Pal.shadow;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(u.x, u.y);
      ctx.lineTo(ep.x, ep.y);
      ctx.stroke();
      if (ep.showMarker){
        drawTargetMarker(ep.x, ep.y, p1Pal.marker, 0.74, ep.x - u.x, ep.y - u.y);
      }
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }


  function drawSelectionRing(){
    if (state !== State.GAME) return;

    ctx.shadowBlur = 18;

  function buildGameUI(){
    ui.buttons = [];

    const compact = isPhoneViewport() || isShortViewport();
    const phoneLandscape = isPhoneLandscapeViewport();
    const gap = compact ? 8 : 12;
    const totalW = Math.min(Math.floor(W * (compact ? 0.94 : 0.88)), Math.floor(game.platform.w * (compact ? 0.96 : 0.92)));
    const pauseW = clamp(Math.floor(totalW * (compact ? 0.20 : 0.22)), compact ? 74 : 110, compact ? 116 : 170);
    const bw = Math.floor((totalW - pauseW - gap*2) / 2);
    const bh = phoneLandscape ? 30 : compact ? 36 : 44;
    const x = Math.floor(W/2 - totalW/2);
    const y = Math.floor(game.platform.y + game.platform.h + (phoneLandscape ? 4 : compact ? 12 : 22));

    addButton("primary", x, y, bw, bh, "START", () => {
      if (isSinglePlayerMode()){
        if (!allPlansReadyFor(game.team1)) return;
        beginRevealThenExecute();
      } else {
        // Two-player flow:
        // P1 plans -> READY -> handoff -> P2 plans -> START
        if (!game.p1Ready){
          if (!allPlansReadyFor(game.team1)) return;
          game.p1Ready = true;
          swapToPlayer2Plan();
          beginPlayerGate(2, "PLAYER 2 START");
        } else {
          if (!allPlansReadyFor(game.team2)) return;
          beginRevealThenExecute();
        }
      }
    });

    addButton("pause_ingame", x + bw + gap, y, pauseW, bh, "PAUSE", () => {
      if (state === State.GAME) pauseGame();
    });
    addButton("clear", x + bw + gap + pauseW + gap, y, bw, bh, compact ? "CLEAR" : "CLEAR (C)", () => clearPlans());
  }

  // ============================================================
  // Transition overlay
  // ============================================================
  function updateTransition(dt){
    if (!transition.active) return;

    transition.t += dt * 1000;
    const p = clamp(transition.t / transition.dur, 0, 1);

    if (p >= 0.5 && state !== transition.to){
      state = transition.to;
      ui.buttons = [];
      if (state === State.MENU) buildMenuUI();
      if (state === State.SETUP) buildSetupUI();
      if (state === State.SETTINGS) buildSettingsUI();
      if (state === State.CREDITS) buildCreditsUI();
      if (state === State.HELP) buildHelpUI();
      if (state === State.GAME) { paused = false; ui.buttons = []; armOnboardingIfNeeded(); }
      if (state === State.WIN) buildWinUI();
    }
    if (p >= 1){
      transition.active = false;
      transition.t = 0;
    }
  }

  function drawTransitionOverlay(){
    if (!transition.active) return;
    const p = clamp(transition.t / transition.dur, 0, 1);
    const a = 1 - Math.abs(0.5 - p) * 2;
    const eased = smoothstep(a);

    ctx.save();
    ctx.globalAlpha = 0.9 * eased;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, 0, W, H);

    ctx.globalAlpha = 0.75 * eased;
    ctx.strokeStyle = "rgba(0,228,102,0.6)";
    ctx.lineWidth = 2;
    ctx.shadowColor = "rgba(0,228,102,0.8)";
    ctx.shadowBlur = 22;

    const y = lerp(-40, H + 40, p);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();

    ctx.restore();
  }

  function drawBloomPass(){
    if (!PERF.bloomEnabled) return;
    if (!bloomCtx || W <= 0 || H <= 0) return;

    // Snapshot the current frame, then reproject with blur + screen blending.
    bloomCtx.setTransform(1, 0, 0, 1, 0, 0);
    bloomCtx.clearRect(0, 0, W, H);
    bloomCtx.drawImage(canvas, 0, 0, W, H);

    ctx.save();
    ctx.globalCompositeOperation = "screen";
    const prevFilter = ctx.filter;
    ctx.filter = "blur(9px) saturate(190%)";
    ctx.globalAlpha = 0.26;
    ctx.drawImage(bloomCanvas, 0, 0, W, H);
    ctx.filter = "blur(4px)";
    ctx.globalAlpha = 0.18;
    ctx.drawImage(bloomCanvas, 0, 0, W, H);
    ctx.filter = prevFilter;
    ctx.restore();
  }

      for (let i = 0; i < TEAM_COLOR_ORDER.length; i++){

        const rect = drawColorChoiceChip(x, yy, cellW, cellH, preset, selected, locked);
        if (!locked){
          hitTargets.push({ ...rect, team, key });
        }
      }

      y += Math.ceil(TEAM_COLOR_ORDER.length / cols) * (cellH + (compact ? 8 : 10));
      return y + (team === 2 ? (compact ? 34 : 24) : 10);
    };

    soundSlider = drawVolumeSliderRow(rowX, viewY + 20 - settingsScrollY, "SOUND", settings.soundVolume, viewW);
    musicSlider = drawVolumeSliderRow(rowX, viewY + 82 - settingsScrollY, "MUSIC", settings.musicVolume, viewW);
    devToggle = drawToggleRow(rowX, viewY + 144 - settingsScrollY, "DEV MODE", settings.devMode, viewW);
    rowY = drawColorSection("PLAYER ONE", 1, rowY);
    rowY = drawColorSection("PLAYER TWO", 2, rowY);
    ctx.restore();

    const contentBottom = rowY + settingsScrollY + (compact ? 18 : 8);
    settingsScrollMax = Math.max(0, contentBottom - (viewY + viewH));
    settingsScrollY = clamp(settingsScrollY, 0, settingsScrollMax);

    if (settingsScrollMax > 0){
      const barX = viewX + viewW + 6;
      const barY = viewY - 2;
      const barH = viewH + 4;
      const thumbH = Math.max(30, barH * (barH / (barH + settingsScrollMax)));
      const tt = settingsScrollY / settingsScrollMax;
      const thumbY = barY + (barH - thumbH) * tt;

      ctx.save();
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = "rgba(0,228,102,0.12)";
      ctx.fillRect(barX, barY, 6, barH);
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = "rgba(0,228,102,0.40)";
      ctx.fillRect(barX, thumbY, 6, thumbH);
      ctx.restore();
    }
    const updateSliderValue = (rect, key) => {
      if (!rect) return;
      const t = clamp((mx - rect.trackX) / rect.trackW, 0, 1);
      if (key === "sound"){
        const prev = settings.soundVolume;
        setSoundVolume(t);
        if (Math.abs(prev - settings.soundVolume) >= 0.03 && settings.soundVolume > 0.001 && canPlaySfx("sound_preview", 0.08)){
          tone(620, 0.035, "triangle", 0.024, 0, 760);
        }
      } else if (key === "music"){
        setMusicVolume(t, true);
      }
    };
    if (input.justDown){
      if (soundSlider && pointInRect(mx, my, soundSlider)){
        settingsSliderDrag.key = "sound";
        clearSettingsTouchScroll();
        ui.pressed = null;
        updateSliderValue(soundSlider, "sound");
      } else if (musicSlider && pointInRect(mx, my, musicSlider)){
        settingsSliderDrag.key = "music";
        clearSettingsTouchScroll();
        ui.pressed = null;
        updateSliderValue(musicSlider, "music");
      }
    }
    if (input.down && settingsSliderDrag.key){
      if (settingsSliderDrag.key === "sound") updateSliderValue(soundSlider, "sound");
      else if (settingsSliderDrag.key === "music") updateSliderValue(musicSlider, "music");
    }
    if (input.justUp){
      if (devToggle && pointInRect(mx, my, devToggle)){
        setDevModeEnabled(!settings.devMode);
        clickSound();
      } else if (pointInSettingsScrollArea(mx, my)){
        for (const h of hitTargets){
          if (!pointInRect(mx, my, h)) continue;
          const ok = setTeamColorPreference(h.team, h.key);
          if (ok){
            beep(620, 0.03, "triangle", 0.03);
          } else {
            beep(220, 0.035, "square", 0.02);
          }
          break;
        }
      }
    }

    for (const b of getActiveButtons()) drawButton(b, mx, my);

    if (!hasCoarsePointer()) drawFooterHint("ESC TO GO BACK");
    input.justUp = false;
    input.justDown = false;
  }

  function drawCredits(t){
    drawNeonGrid(t);
    const { panelW, panelH, px, py, viewX, viewY, viewW, viewH } = getCreditsLayout();
    if (!isPhoneViewport()){
      drawTitle(Math.floor(H * 0.18), "CREDITS");
    }
    drawPanel(px, py, panelW, panelH);
    creditsScrollMax = 0;
    creditsScrollY = 0;

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(217,255,239,0.94)";
    const compact = isPhoneViewport() || isShortViewport();
    ctx.font = compact ? "700 18px ui-monospace, Menlo, Consolas, monospace" : "700 22px ui-monospace, Menlo, Consolas, monospace";
    ctx.fillText("Created by Aaron", W/2, viewY + Math.floor(viewH * (compact ? 0.34 : 0.38)));
    ctx.font = compact ? "700 15px ui-monospace, Menlo, Consolas, monospace" : "700 18px ui-monospace, Menlo, Consolas, monospace";
    ctx.fillStyle = "rgba(175,255,214,0.90)";
    ctx.fillText("Music: Arcade Ride by Vens Adams", W/2, viewY + Math.floor(viewH * (compact ? 0.62 : 0.62)));
    ctx.restore();

    const mx = input.x, my = input.y;
    for (const b of getActiveButtons()) drawButton(b, mx, my);

    if (!hasCoarsePointer()) drawFooterHint("ESC TO GO BACK");
  }
  function drawHelp(t){
    drawNeonGrid(t);

    const { panelW, panelH, px, py, viewX, viewY, viewW, viewH } = getHelpLayout();
    drawPanel(px, py, panelW, panelH);

    const textFont = "13px ui-monospace, Menlo, Consolas, monospace";
    const titleFont = "700 14px ui-monospace, Menlo, Consolas, monospace";
    const sections = [
      { title: "KNOCKOUT", items: [getOnboardingTutorial("KNOCKOUT").subtitle, ...getOnboardingTutorial("KNOCKOUT").tips] },
      { title: "FOOTBALL", items: [getOnboardingTutorial("FOOTBALL").subtitle, ...getOnboardingTutorial("FOOTBALL").tips] },
      { title: "KEEP AWAY", items: [getOnboardingTutorial("KEEP_AWAY").subtitle, ...getOnboardingTutorial("KEEP_AWAY").tips] },
      { title: "CONTROLS", items: [
        "Click a unit, then click a destination to set its arrow.",
        "A longer arrow applies more power.",
        "A shorter arrow applies less power.",
        "Press START to resolve all planned moves."
      ]}
    ];

    ctx.save();
    ctx.textAlign = "left";
    ctx.textBaseline = "top";

    const measureLines = (text, maxWidth) => {
      const words = String(text).split(/\s+/);
      const out = [];
      let line = "";
      for (const w of words){
        const test = line ? `${line} ${w}` : w;
        if (ctx.measureText(test).width > maxWidth && line){
          out.push(line);
          line = w;
        } else {
          line = test;
        }
      }
      if (line) out.push(line);
      return out.length ? out : [""];
    };

    const maxTextW = viewW - 30;
    const bulletTextW = maxTextW - 16;
    const lineH = 18;

    ctx.font = textFont;
    let contentH = 12;
    for (const sec of sections){
      contentH += 22;
      for (const item of sec.items){
        const wrappedCount = measureLines(item, bulletTextW).length;
        contentH += wrappedCount * lineH;
      }
      contentH += 8;
    }
    helpScrollMax = Math.max(0, contentH - viewH);
    helpScrollY = clamp(helpScrollY, 0, helpScrollMax);

    ctx.save();
    ctx.beginPath();
    ctx.rect(viewX, viewY, viewW, viewH);
    ctx.clip();

    let y = viewY + 12 - helpScrollY;
    for (const sec of sections){
      ctx.fillStyle = COL_TEXT;
      ctx.font = titleFont;
      ctx.fillText(sec.title, viewX + 6, y);

      ctx.strokeStyle = "rgba(0,228,102,0.30)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(viewX + 6, y + 16);
      ctx.lineTo(viewX + viewW - 20, y + 16);
      ctx.stroke();
      y += 22;

      ctx.fillStyle = "rgba(217,255,239,0.82)";
      ctx.font = textFont;
      for (const item of sec.items){
        const lines = measureLines(item, bulletTextW);
        for (let i = 0; i < lines.length; i++){
          const prefix = (i === 0) ? "- " : "  ";
          ctx.fillText(prefix + lines[i], viewX + 8, y);
          y += lineH;
        }
      }
      y += 8;
    }
    ctx.restore();

    if (helpScrollMax > 0){
      const barX = viewX + viewW + 6;
      const barY = viewY - 2;
      const barH = viewH + 4;
      const thumbH = Math.max(30, barH * (barH / (barH + helpScrollMax)));
      const tt = helpScrollY / helpScrollMax;
      const thumbY = barY + (barH - thumbH) * tt;
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = "rgba(0,228,102,0.12)";
      ctx.fillRect(barX, barY, 6, barH);
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = "rgba(0,228,102,0.40)";
      ctx.fillRect(barX, thumbY, 6, thumbH);
    }
    ctx.restore();

    const mx = input.x, my = input.y;
    for (const b of getActiveButtons()) drawButton(b, mx, my);
  }

  function drawPause(t){
    drawNeonGrid(t);
    drawGameplay(t);

    // dim overlay
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.70)";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // bordered pause panel
    const panelW = Math.min(560, Math.floor(W * 0.78));
    const panelH = 412;
    const px = Math.floor(W/2 - panelW/2);
    const py = Math.floor(H/2 - panelH/2);

    drawPanel(px, py, panelW, panelH);

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "800 44px ui-monospace, Menlo, Consolas, monospace";
    ctx.fillStyle = COL_NEON;
    ctx.shadowColor = "rgba(0,228,102,0.75)";
    ctx.shadowBlur = 18;
    ctx.fillText("PAUSED", W/2, py + 64);
    ctx.restore();

    if (!ui.buttons || ui.buttons.length === 0) buildPauseUI();
const mx = input.x, my = input.y;
    for (const b of getActiveButtons()) drawButton(b, mx, my);

    if (!hasCoarsePointer()){
      ctx.save();
      ctx.fillStyle = "rgba(0,228,102,0.60)";
      ctx.font = `12px ${FONT}`;
      ctx.textAlign = "center";
      ctx.fillText("ESC TO RESUME", W/2, py + panelH - 22);
      ctx.restore();
    }
  }

  function drawWin(t){
    drawNeonGrid(t);

    const sideLabel = isTwoPlayerMode() ? "PLAYER 2" : "AI";
    const winnerKey = game.seriesOver ? game.seriesWinner : game.winner;
    const msg = (winnerKey === "player") ? "PLAYER 1 WINS" : `${sideLabel} WINS`;
    const sideScoreLabel = isTwoPlayerMode() ? "P2" : "AI";
    const compact = isShortViewport();
    const titleW = Math.min(540, Math.floor(W * 0.54));
    const titleH = compact ? 74 : 86;
    const scoreW = Math.min(420, Math.floor(W * 0.42));
    const scoreH = compact ? 50 : 58;
    const titleX = Math.floor(W/2 - titleW/2);
    const titleY = Math.floor(H * (compact ? 0.22 : 0.24));
    const scoreX = Math.floor(W/2 - scoreW/2);
    const scoreY = titleY + titleH + 16;

    ctx.save();
    drawPanel(titleX, titleY, titleW, titleH);
    drawPanel(scoreX, scoreY, scoreW, scoreH);

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(0,228,102,0.8)";
    ctx.shadowBlur = 18;
    ctx.fillStyle = COL_NEON;
    ctx.font = `${compact ? 700 : 800} ${compact ? 38 : 46}px ui-monospace, Menlo, Consolas, monospace`;
    ctx.fillText(msg, W/2, titleY + titleH * 0.52);

    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(217,255,239,0.84)";
    ctx.font = `${compact ? 16 : 18}px ui-monospace, Menlo, Consolas, monospace`;
    ctx.fillText(`P1 ${game.playerWins} / ${game.aiWins} ${sideScoreLabel}`, W/2, scoreY + scoreH * 0.5);
    ctx.restore();

    if (ui.buttons.length === 0) buildWinUI();
    const mx = input.x, my = input.y;
    for (const b of getActiveButtons()) drawButton(b, mx, my);
  }

  // ============================================================
  // Main loop (60 FPS)
  // ============================================================
  let lastT = now();
  function frame(){
    const t = timeSec();
    const tNow = now();
    const dt = clamp((tNow - lastT) / 1000, 0, 0.033);
  if (fatalErrorMsg){
    drawFatalError();
    requestAnimationFrame(frame);
    return;
  }
    lastT = tNow;

    if (unlockToast.active){
      unlockToast.timer = Math.max(0, unlockToast.timer - dt);
      if (unlockToast.timer <= 0) unlockToast.active = false;
    }

    updateTransition(dt);

    // Ensure UI
    if (state === State.MENU && ui.buttons.length === 0 && !transition.active) buildMenuUI();
    if (state === State.SETUP && ui.buttons.length === 0 && !transition.active) buildSetupUI();
    if (state === State.SETTINGS && ui.buttons.length === 0 && !transition.active) buildSettingsUI();
    if (state === State.CREDITS && ui.buttons.length === 0 && !transition.active) buildCreditsUI();
    if (state === State.HELP && ui.buttons.length === 0 && !transition.active) buildHelpUI();

    if (state === State.GAME){
      if (!paused && !needsLandscapeRotateOverlay()){
        updateGameplay(dt);
      }
    }

    // Render
    if (state === State.MENU) drawMenu(t);
    else if (state === State.SETUP) drawSetup(t);
    else if (state === State.SETTINGS) drawSettings(t);
    else if (state === State.CREDITS) drawCredits(t);
    else if (state === State.HELP) drawHelp(t);
    else if (state === State.GAME) { drawNeonGrid(t); drawGameplay(t); }
    else if (state === State.PAUSE) drawPause(t);
    else if (state === State.WIN) drawWin(t);
    else { drawNeonGrid(t); }

    drawTransitionOverlay();
    drawUnlockToast();
    drawRotateDeviceOverlay();
    drawBloomPass();
    input.justDown = false;
    input.justUp = false;

    requestAnimationFrame(frame);
  }

  // ============================================================
  // Boot
  // ============================================================
  let resizeReflowTimer = null;
  function scheduleResponsiveRelayout(){
    if (resizeReflowTimer) clearTimeout(resizeReflowTimer);
    resizeReflowTimer = setTimeout(() => {
      resizeReflowTimer = null;
      if (transition.active) return;

      if (state === State.GAME || state === State.PAUSE){
        const wasPaused = (state === State.PAUSE || paused);
        reflowMatchLayoutOnResize();
        if (wasPaused){
          paused = true;
          state = State.PAUSE;
          buildPauseUI();
        } else {
          paused = false;
          state = State.GAME;
          ui.buttons = [];
        }
        return;
      }

      if (state === State.SETUP){ buildSetupUI(); return; }
      if (state === State.MENU){ buildMenuUI(); return; }
      if (state === State.SETTINGS){ buildSettingsUI(); return; }
      if (state === State.CREDITS){ buildCreditsUI(); return; }
      if (state === State.HELP){ buildHelpUI(); return; }
      if (state === State.WIN){ buildWinUI(); }
    }, 120);
  }
  window.addEventListener("resize", scheduleResponsiveRelayout, { passive: true });
  window.visualViewport?.addEventListener("resize", scheduleResponsiveRelayout, { passive: true });
  window.visualViewport?.addEventListener("scroll", scheduleResponsiveRelayout, { passive: true });

  resetMatch();
  buildMenuUI();
  requestAnimationFrame(frame);

  
  // __nk_setup_wheel
  window.addEventListener("wheel", (e)=>{
    if (state === State.SETUP){
      setupScrollY = clamp(setupScrollY + e.deltaY * 0.9, 0, setupScrollMax);
      buildSetupUI();
      e.preventDefault();
    } else if (state === State.SETTINGS){
      settingsScrollY = clamp(settingsScrollY + e.deltaY * 0.9, 0, settingsScrollMax);
      e.preventDefault();
    } else if (state === State.CREDITS){
      creditsScrollY = clamp(creditsScrollY + e.deltaY * 0.9, 0, creditsScrollMax);
      e.preventDefault();
    } else if (state === State.HELP){
      helpScrollY = clamp(helpScrollY + e.deltaY * 0.9, 0, helpScrollMax);
      e.preventDefault();
    }
  }, { passive:false });
window.addEventListener("contextmenu", (e) => e.preventDefault());

})();



  function wrapText(ctx, text, x, y, maxWidth, lineHeight){
    const words = String(text).split(/\s+/);
    let line = '';
    for (let n=0;n<words.length;n++){
      const testLine = line + words[n] + ' ';
      const w = ctx.measureText(testLine).width;
      if (w > maxWidth && n>0){
        ctx.fillText(line, x, y);
        line = words[n] + ' ';
        y += lineHeight;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line, x, y);
  }
</script>
