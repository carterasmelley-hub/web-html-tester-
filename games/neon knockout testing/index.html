  function drawFatalError(){
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = "rgba(0,228,102,0.9)";
    ctx.lineWidth = 2;
    ctx.strokeRect(40,40,W-80,H-80);
    ctx.fillStyle = "rgba(0,228,102,0.95)";
    ctx.font = "20px monospace";
    ctx.fillText("RUNTIME ERROR", 60, 80);
    ctx.font = "14px monospace";
    const msg = String(fatalErrorMsg || "");
    const words = msg.split(/\s+/);
    let x = 60, y = 110, maxW = W-120;
    let line = "";
    for (const w of words){
      const test = line ? (line + " " + w) : w;
      if (ctx.measureText(test).width > maxW){
        ctx.fillText(line, x, y);
        y += 18;
        line = w;
      } else {
        line = test;
      }
      if (y > H-60) break;
    }
    if (line && y <= H-60) ctx.fillText(line, x, y);
    ctx.font = "12px monospace";
    ctx.fillText("Open console for details. Fix the syntax/error and refresh.", 60, H-55);
    ctx.restore();
  }
  const UA = navigator.userAgent || "";

  const PERF = {
    firefox: IS_FIREFOX,
    // Firefox struggles with full-frame blur/filter passes in this game.

  function resolveCircleCircle(a, b){
    if (!a.alive || !b.alive) return;
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const rr = a.r + b.r;
    const dist2 = dx*dx + dy*dy;
    if (dist2 >= rr*rr || dist2 === 0) return;

    const dist = Math.sqrt(dist2);
    const nx = dx / dist;
    const ny = dy / dist;

    // Positional correction (split by mass)
    const penetration = rr - dist;
    const invA = 1 / (a.m || 1);
    const invB = 1 / (b.m || 1);
    const invSum = invA + invB;

    const slop = 0.01;
    const percent = 0.92; // strong so it doesn't feel sticky
    const corr = Math.max(0, penetration - slop) * percent / invSum;

    a.x -= nx * corr * invA;
    a.y -= ny * corr * invA;
    b.x += nx * corr * invB;
    b.y += ny * corr * invB;

    // Relative velocity along normal
    const rvx = (b.vx - a.vx);
    const rvy = (b.vy - a.vy);
    const velAlongNormal = rvx*nx + rvy*ny;

    // If separating, don't add impulse
    if (velAlongNormal > 0) return;

    // Restitution (pool-y)
    const e = 0.90;
    let j = -(1 + e) * velAlongNormal;
    j = j / invSum;

    const impX = j * nx;
    const impY = j * ny;

    a.vx -= impX * invA;
    a.vy -= impY * invA;
    b.vx += impX * invB;
    b.vy += impY * invB;

    // Tiny tangential damping to prevent "glue" without adding pull
    const tx = -ny;
    const ty = nx;
    const velT = rvx*tx + rvy*ty;
    const mu = 0.012;
    const jt = -velT * mu;
    a.vx -= jt * tx * invA;
    a.vy -= jt * ty * invA;
    b.vx += jt * tx * invB;
    b.vy += jt * ty * invB;
  }

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  const FONT = "ui-monospace, Menlo, Consolas, monospace";
  

  function segIntersectsRect(x1,y1,x2,y2, r){
    let t0 = 0, t1 = 1;
    const dx = x2 - x1, dy = y2 - y1;
    function clip(p,q){
      if (p === 0) return q >= 0;
      const t = q / p;
      if (p < 0){ if (t > t1) return false; if (t > t0) t0 = t; }
      else { if (t < t0) return false; if (t < t1) t1 = t; }
      return true;
    }
    if (clip(-dx, x1 - r.x) && clip(dx, (r.x + r.w) - x1) && clip(-dy, y1 - r.y) && clip(dy, (r.y + r.h) - y1)){
      return t1 > t0;
    }
    return false;
  }

  function segIntersectsCircle(x1,y1,x2,y2, c){
    const vx = x2-x1, vy = y2-y1;
    const wx = c.x-x1, wy = c.y-y1;
    const vv = vx*vx + vy*vy;
    let t = (vv>0) ? (wx*vx + wy*vy)/vv : 0;
    t = clamp(t, 0, 1);
    const px = x1 + vx*t, py = y1 + vy*t;
    const dx = c.x - px, dy = c.y - py;
    const rr = (c.r + 6);
    return (dx*dx + dy*dy) <= rr*rr;
  }

function lerp(a, b, t){ return a + (b - a) * t; }
  function smoothstep(t){ return t * t * (3 - 2 * t); }
  function rand(min, max){ return min + Math.random() * (max - min); }
  function now(){ return performance.now(); }
  function hashFNV1a(str){
    let h = 0x811c9dc5;
    for (let i = 0; i < str.length; i++){
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 0x01000193);
    }
    return (h >>> 0).toString(16).padStart(8, "0");
  }
  function getBuildSignature(){
    try{
      const src = document.documentElement?.outerHTML || "";
      if (src) return hashFNV1a(src);
    } catch (_) {}
    return "00000000";
  }
  const TAU = Math.PI * 2;

  // Colors / style
  const COL_BG = "#020207";
  const COL_NEON = "#00e466";
  const COL_TEXT = "#e8fff6";
  const COL_TEXT_DIM = "rgba(232,255,246,0.82)";
  const COL_PANEL = "rgba(0,0,0,0.64)";
  const COL_PANEL_EDGE = "rgba(0,228,102,0.62)";

  const MAP_UNLOCKS_KEY = "nk_map_unlocks_v1";
  const MAP_PROGRESS_KEY = "nk_map_progress_v1";
  const GAME_VERSION = (() => {
    let version = 1;
    try{
      const signature = getBuildSignature();
      const storedSignature = localStorage.getItem(VERSION_SIGNATURE_KEY);
      const storedVersion = parseInt(localStorage.getItem(VERSION_KEY) || "", 10);
      if (Number.isFinite(storedVersion) && storedVersion >= 1) version = storedVersion;

      if (!storedSignature){
        version = 1;
      } else if (storedSignature !== signature){
        version = Math.max(1, version + 1);
      }

      localStorage.setItem(VERSION_SIGNATURE_KEY, signature);
      localStorage.setItem(VERSION_KEY, String(version));
    } catch (_) {}
    return version;
  })();

  const TEAM_COLOR_PREFS_KEY = "nk_team_color_prefs_v1";
  const TEAM_COLOR_ORDER = Object.freeze(["GREEN", "RED", "BLUE", "YELLOW", "PURPLE", "PINK"]);
  const TEAM_COLOR_PRESETS = Object.freeze({

    RED:    Object.freeze({ label: "RED",    unit: "rgba(202,16,54,0.98)",  line: "rgba(255,80,80,0.74)", shadow: "rgba(255,80,80,0.58)", marker: "rgba(255,110,110,0.86)", ring: "rgba(255,80,80,0.92)" }),
    BLUE:   Object.freeze({ label: "BLUE",   unit: "rgba(32,146,255,0.98)", line: "rgba(88,188,255,0.74)", shadow: "rgba(88,188,255,0.58)", marker: "rgba(148,223,255,0.88)", ring: "rgba(88,188,255,0.92)" }),

    PURPLE: Object.freeze({ label: "PURPLE", unit: "rgba(174,96,255,0.98)", line: "rgba(198,132,255,0.74)", shadow: "rgba(198,132,255,0.58)", marker: "rgba(224,188,255,0.88)", ring: "rgba(198,132,255,0.92)" }),
    PINK:   Object.freeze({ label: "PINK",   unit: "rgba(255,86,196,0.98)", line: "rgba(255,126,214,0.74)", shadow: "rgba(255,126,214,0.58)", marker: "rgba(255,186,232,0.88)", ring: "rgba(255,126,214,0.92)" })
  });
  function normalizeTeamColors(playerColor, enemyColor){
    const player = TEAM_COLOR_PRESETS[playerColor] ? playerColor : "GREEN";
    let enemy = TEAM_COLOR_PRESETS[enemyColor] ? enemyColor : "RED";
    if (enemy === player){
      enemy = (player === "RED") ? "BLUE" : "RED";
      if (enemy === player) enemy = "GREEN";
    }
    return { player, enemy };
  }
  function loadTeamColorPrefs(){
    try{
      const raw = localStorage.getItem(TEAM_COLOR_PREFS_KEY);
      if (!raw) return normalizeTeamColors("GREEN", "RED");
      const parsed = JSON.parse(raw);
      return normalizeTeamColors(parsed?.playerColor, parsed?.enemyColor);
    } catch (_){
      return normalizeTeamColors("GREEN", "RED");
    }
  }
  function saveTeamColorPrefs(playerColor, enemyColor){
    try{
      const normalized = normalizeTeamColors(playerColor, enemyColor);
      localStorage.setItem(TEAM_COLOR_PREFS_KEY, JSON.stringify({
        playerColor: normalized.player,
        enemyColor: normalized.enemy
      }));
    } catch (_) {}
  }
  function loadSettingsPrefs(){
    try{
      const raw = localStorage.getItem(SETTINGS_PREFS_KEY);
      if (!raw) return { sound: true, music: true, soundVolume: 0.82, musicVolume: 0.72, devMode: false };
      const parsed = JSON.parse(raw);
      const parsedSoundVolume = typeof parsed?.soundVolume === "number" ? clamp(parsed.soundVolume, 0, 1) : (parsed?.sound === false ? 0 : 0.82);
      const parsedMusicVolume = typeof parsed?.musicVolume === "number" ? clamp(parsed.musicVolume, 0, 1) : (parsed?.music === false ? 0 : 0.72);
      return {
        sound: parsedSoundVolume > 0.001,
        music: parsedMusicVolume > 0.001,
        soundVolume: parsedSoundVolume,
        musicVolume: parsedMusicVolume,
        devMode: parsed?.devMode === true
      };
    } catch (_){
      return { sound: true, music: true, soundVolume: 0.82, musicVolume: 0.72, devMode: false };
    }
  }
  function saveSettingsPrefs(soundVolume, musicVolume, devMode){
    const sfx = clamp(soundVolume ?? 0.82, 0, 1);
    const music = clamp(musicVolume ?? 0.72, 0, 1);
    try{
      localStorage.setItem(SETTINGS_PREFS_KEY, JSON.stringify({
        sound: sfx > 0.001,
        music: music > 0.001,
        soundVolume: sfx,
        musicVolume: music,
        devMode: devMode === true
      }));
    } catch (_) {}
  }
  function loadMapUnlocks(){
    try{
      const raw = localStorage.getItem(MAP_UNLOCKS_KEY);

      const parsed = JSON.parse(raw);

    } catch (_){
      return { bridges: false, doors: false };
    }

    try{

        bridges: mapUnlocks.bridges === true,
        doors: mapUnlocks.doors === true
      }));
    } catch (_) {}
  }
  function loadMapProgress(){
    try{
      const raw = localStorage.getItem(MAP_PROGRESS_KEY);
      if (!raw) return { multiplayerRounds: 0, hardRounds: 0, normalRounds: 0 };
      const parsed = JSON.parse(raw);
      return {
        multiplayerRounds: Math.max(0, parsed?.multiplayerRounds | 0),
        hardRounds: Math.max(0, parsed?.hardRounds | 0),
        normalRounds: Math.max(0, parsed?.normalRounds | 0)
      };
    } catch (_){
      return { multiplayerRounds: 0, hardRounds: 0, normalRounds: 0 };
    }
  }
  function saveMapProgress(){
    try{
      localStorage.setItem(MAP_PROGRESS_KEY, JSON.stringify({
        multiplayerRounds: mapProgress.multiplayerRounds | 0,
        hardRounds: mapProgress.hardRounds | 0,
        normalRounds: mapProgress.normalRounds | 0
      }));
    } catch (_) {}

  // Resize
  let W = 0, H = 0;
  function hasCoarsePointer(){
    try{
      return !!(navigator.maxTouchPoints > 0 || window.matchMedia?.("(pointer: coarse)")?.matches);
    } catch (_){
      return navigator.maxTouchPoints > 0;
    }
  }
  function isPhoneViewport(){
    return hasCoarsePointer() && (Math.min(W, H) <= 560 || (W <= 980 && H <= 560));
  }
  function isPhoneLandscapeViewport(){
    return isPhoneViewport() && W > H;
  }
  function isMobileCompactLayout(){
    return isPhoneViewport();
  }
  function isShortViewport(){
    return H <= 760 || (W <= 1280 && H <= 820);
  }
  function isSetupCompactLayout(){
    return isMobileCompactLayout() || isShortViewport();
  }
  function needsLandscapeRotateOverlay(){
    return false;
  }
  function resize(){
    const vv = window.visualViewport;
    W = Math.floor(vv?.width || window.innerWidth);
    H = Math.floor(vv?.height || window.innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    bloomCanvas.width = W;
    bloomCanvas.height = H;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize, { passive: true });
  resize();

  // ============================================================
  // Settings (audio + team colors persisted)
  // ============================================================
  const loadedSettings = loadSettingsPrefs();
  const loadedTeamColors = loadTeamColorPrefs();
  const settings = {
    sound: loadedSettings.sound,

    musicVolume: loadedSettings.musicVolume,

    enemyColor: loadedTeamColors.enemy
  };
  const loadedMapUnlocks = loadMapUnlocks();
  const mapUnlocks = {
    bridges: loadedMapUnlocks.bridges,

  };
  const loadedMapProgress = loadMapProgress();
  const mapProgress = {

  };
  const unlockToast = {

  function onboardingModeKey(){
    return String(config.mode || "KNOCKOUT");
  }

    return ONBOARDING_TUTORIALS[modeKey] || ONBOARDING_TUTORIALS.KNOCKOUT;

    const mode = onboardingModeKey();
    onboarding.mode = mode;
    onboarding.active = !onboarding.shownModes.has(mode);
  }
  function dismissOnboarding(){
    onboarding.active = false;
    onboarding.shownModes.add(onboarding.mode || onboardingModeKey());
  }
  function setSoundVolume(value){
    settings.soundVolume = clamp(value, 0, 1);
    settings.sound = settings.soundVolume > 0.001;
    saveSettingsPrefs(settings.soundVolume, settings.musicVolume, settings.devMode);
    if (settings.sound) ensureAudio();
    refreshAudioLevels();
  }
  function setMusicVolume(value, userGesture=false){
    settings.musicVolume = clamp(value, 0, 1);
    settings.music = settings.musicVolume > 0.001;

    applyMusicState(userGesture);
  }
  function setDevModeEnabled(enabled){
    settings.devMode = !!enabled;
    saveSettingsPrefs(settings.soundVolume, settings.musicVolume, settings.devMode);

  }
  function setTeamColorPreference(team, colorKey){
    if (!TEAM_COLOR_PRESETS[colorKey]) return false;
    if (team === 1){
      if (colorKey === settings.enemyColor) return false;
      settings.playerColor = colorKey;
    } else {
      if (colorKey === settings.playerColor) return false;
      settings.enemyColor = colorKey;
    }
    saveTeamColorPrefs(settings.playerColor, settings.enemyColor);

  }

  // ============================================================
  // Game Config (Custom Game / Quick Match)
  // ============================================================
  const config = {
    players: 1,          // 1 | 2
    mode: "KNOCKOUT",    // "KNOCKOUT" | "FOOTBALL" | "KEEP_AWAY"
    difficulty: "NORMAL", // "EASY" | "NORMAL" | "HARD" (single-player only)

  };
  function isTwoPlayerMode(){ return config.players === 2; }
  function isSinglePlayerMode(){ return config.players !== 2; }
  function isKnockoutMode(){ return config.mode === "KNOCKOUT"; }
  function isFootballMode(){ return config.mode === "FOOTBALL"; }
  function isKeepAwayMode(){ return config.mode === "KEEP_AWAY"; }

  const SERIES_LOOKUP = Object.freeze({

  const DIFF = {

    HARD:   { aimJitter: 8,   distMin: 0.76, distMax: 1.00, steer: 0.24, intercept: 0.96, leadJitter: 0.03, circleSafety: 0.82, edgeSafety: 0.70, directBias: 0.56, fastShotBias: 0.78, pressure: 1.48 }
  };

  // ============================================================
  // Audio (simple beeps + background music)
  // ============================================================
  const MUSIC_TRACK_SRC = "arcade-ride-vens-adams-main-version-27955-01-45.mp3";
  let audioCtx = null;
  let bgMusicEl = null;
  let sfxMasterGain = null;
  let musicMasterGain = null;
  let musicSourceNode = null;
  const sfxCooldowns = Object.create(null);
  function sfxVolumeScalar(){
    const v = clamp(settings.soundVolume, 0, 1);
    return v <= 0.001 ? 0 : 0.20 + 1.20 * Math.pow(v, 1.08);
  }
  function musicVolumeScalar(){
    const v = clamp(settings.musicVolume, 0, 1);
    return v <= 0.001 ? 0 : Math.pow(v, 1.05);
  }
  function ensureAudio(){
    const wantsSfx = !!(settings.sound && settings.soundVolume > 0.001);

  function normalize(x,y){
    const l = Math.hypot(x,y) || 1;
    return { x: x/l, y: y/l, l };
  }
  function resolveCircleCollision(a, b){
    // Pool-like collision for equal-mass discs:
    // - strong overlap separation (prevents "wrap/orbit")
    // - exchange/solve normal components (1D along collision normal)
    // - light tangent friction (prevents endless sliding-around)
    if (!a.alive || !b.alive) return 0;

    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const rr = a.r + b.r;
    const dist2 = dx*dx + dy*dy;
    if (dist2 >= rr*rr || dist2 === 0) return 0;
    const tune = getPhysicsTuning();

    const dist = Math.sqrt(dist2);
    const nx = dx / dist;
    const ny = dy / dist;

    // --- 1) positional correction (separate hard, like pool balls)
    const penetration = rr - dist;

    // Strong correction + tiny slop to avoid jitter
    const slop = 0.01;
    const percent = 1.0; // maxed (we also iterate)
    const corr = Math.max(0, penetration - slop) * percent * 0.5;

    a.x -= nx * corr;
    a.y -= ny * corr;
    b.x += nx * corr;
    b.y += ny * corr;

    // --- 2) decompose velocities into normal/tangent
    const tx = -ny, ty = nx;

    const va_n = a.vx*nx + a.vy*ny;
    const vb_n = b.vx*nx + b.vy*ny;
    const va_t = a.vx*tx + a.vy*ty;
    const vb_t = b.vx*tx + b.vy*ty;

    // If already separating along normal, skip impulse
    const relN = vb_n - va_n;
    if (relN > 0) return 0;

    // --- 3) pool-ish normal solve (equal mass 1D with restitution)
    // e close to 1 => more "knock"; <1 => a bit of energy loss (feels less floaty)
    const e = tune.unitRestitution;
    const va_n2 = (va_n + vb_n - e*(va_n - vb_n)) * 0.5;
    const vb_n2 = (va_n + vb_n + e*(va_n - vb_n)) * 0.5;

    // --- 4) tangent friction (limits wrap-around)
    // We don't want "glue", just reduce tangential relative motion on contact.
    const mu = tune.tangentFriction; // higher = heavier collisions
    const relT = (vb_t - va_t);
    const maxF = Math.abs(vb_n2 - va_n2) * mu;
    let jt = clamp(-relT * 0.5, -maxF, maxF); // 0.5 = equal mass split

    const va_t2 = va_t - jt;
    const vb_t2 = vb_t + jt;

    // --- 5) reconstruct velocities
    a.vx = va_n2*nx + va_t2*tx;
    a.vy = va_n2*ny + va_t2*ty;
    b.vx = vb_n2*nx + vb_t2*tx;
    b.vy = vb_n2*ny + vb_t2*ty;
    return Math.min(1, Math.abs(relN) / 240);
  }



  function resolveCircleCollisionStatic(u, b){
    const dx = u.x - b.x;
    const dy = u.y - b.y;
    const dist = Math.hypot(dx, dy);
    const minDist = u.r + b.r;
    if (dist <= 0 || dist >= minDist) return 0;
    const nx = dx / dist;
    const ny = dy / dist;
    const overlap = (minDist - dist);
    u.x += nx * overlap;
    u.y += ny * overlap;

    const velN = u.vx * nx + u.vy * ny;
    if (velN < 0){
      const restitution = getPhysicsTuning().bumperRestitution;
      u.vx -= (1 + restitution) * velN * nx;
      u.vy -= (1 + restitution) * velN * ny;
    }
    return Math.min(1, Math.abs(velN) / 240);
  }

  function resolveCircleRectCollision(u, r){
    // Solid wall: circle vs axis-aligned rectangle (impassable)
    const rx = r.x, ry = r.y, rw = r.w, rh = r.h;
    const closestX = Math.max(rx, Math.min(u.x, rx + rw));
    const closestY = Math.max(ry, Math.min(u.y, ry + rh));
    let dx = u.x - closestX;
    let dy = u.y - closestY;
    const rad = u.r;
    let dist2 = dx*dx + dy*dy;

    if (dist2 === 0){
      const left   = Math.abs(u.x - rx);
      const right  = Math.abs((rx + rw) - u.x);
      const top    = Math.abs(u.y - ry);
      const bottom = Math.abs((ry + rh) - u.y);
      const m = Math.min(left, right, top, bottom);
      if (m === left){ dx=-1; dy=0; }
      else if (m === right){ dx=1; dy=0; }
      else if (m === top){ dx=0; dy=-1; }
      else { dx=0; dy=1; }
      dist2 = 1;
    }

    const dist = Math.sqrt(dist2);
    if (dist >= rad) return 0;
    const nx = dx / dist;
    const ny = dy / dist;
    const overlap = (rad - dist);

    u.x += nx * overlap;
    u.y += ny * overlap;

    const velN = u.vx * nx + u.vy * ny;
    if (velN < 0){
      const tune = getPhysicsTuning();
      const restitution = tune.wallRestitution;
      u.vx -= (1 + restitution) * velN * nx;
      u.vy -= (1 + restitution) * velN * ny;

      const tx = -ny, ty = nx;
      const velT = u.vx * tx + u.vy * ty;
      const tangentialDamp = tune.wallTangentialDamp;
      u.vx -= tangentialDamp * velT * tx;
      u.vy -= tangentialDamp * velT * ty;
    }
    return Math.min(1, Math.abs(velN) / 260);
  }

  function computeArenaScale(){
    const minDim = Math.min(W, H);
    const scaleByMin = minDim / 820;
    const compact = isPhoneViewport() || isShortViewport();
    const phoneLandscape = isPhoneLandscapeViewport();
    const scaleByW = (W - (compact ? 28 : 72)) / 820;
    const hudReserve = phoneLandscape ? 172 : compact ? 118 : isMobileCompactLayout() ? 170 : 230;
    const scaleByH = (H - hudReserve) / 520; // leave room for HUD + buttons
    return clamp(Math.min(scaleByMin, scaleByW, scaleByH), phoneLandscape ? 0.42 : compact ? 0.48 : isMobileCompactLayout() ? 0.52 : 0.58, 1.2);
  }
  function getArenaLayout(scale=computeArenaScale()){
    const footballMode = isFootballMode();
    const hockeyMode = isHockeyMode();
    const fieldMode = footballMode || hockeyMode;
    const circleStage = (!fieldMode && config.stage === "CIRCLE");
    const compact = isPhoneViewport() || isShortViewport();
    const phoneLandscape = isPhoneLandscapeViewport();
    const plat = { x:0, y:0, w:0, h:0, cx:0, cy:0, radius:0, shape:"rect" };

    if (fieldMode){
      // Wide field-sport arena (east-west).
      plat.w = Math.floor(clamp(W * (phoneLandscape ? 0.97 : compact ? 0.96 : 0.92), compact ? 420 : 520, W - (compact ? 18 : 44)));
      plat.h = Math.floor(clamp(H * (phoneLandscape ? 0.36 : compact ? 0.42 : 0.46), phoneLandscape ? 150 : compact ? 180 : 230, Math.min(phoneLandscape ? 250 : compact ? 330 : 430, H - (phoneLandscape ? 110 : compact ? 120 : 210))));
      plat.x = Math.floor(W/2 - plat.w/2);
      plat.y = Math.floor(H/2 - plat.h/2 + (phoneLandscape ? 2 : compact ? 10 : 26));
      plat.cx = plat.x + plat.w/2;
      plat.cy = plat.y + plat.h/2;
      plat.radius = 0;
      plat.shape = "rect";
    } else if (circleStage){
      const diam = Math.floor(590 * scale);
      plat.w = diam;
      plat.h = diam;
      plat.x = Math.floor(W/2 - diam/2);
      plat.y = Math.floor(H/2 - diam/2 + (phoneLandscape ? -6 : compact ? 0 : 10));
      plat.cx = plat.x + diam/2;
      plat.cy = plat.y + diam/2;
      plat.radius = diam/2;
      plat.shape = "circle";
    } else {
      plat.w = Math.floor(820 * scale);
      plat.h = Math.floor(520 * scale);
      plat.x = Math.floor(W/2 - plat.w/2);
      plat.y = Math.floor(H/2 - plat.h/2 + (phoneLandscape ? 0 : compact ? 8 : 30));
      plat.cx = plat.x + plat.w/2;
      plat.cy = plat.y + plat.h/2;
      plat.radius = 0;
      plat.shape = "rect";
    }
    return { scale, footballMode, hockeyMode, fieldMode, circleStage, plat };
  }
  function getBridgesStageData(p=game.platform){
    if (!p || p.shape === "circle") return null;
    const pitW = Math.floor(clamp(p.w * 0.17, 76, 126));
    const pitX = Math.floor(p.cx - pitW / 2);
    const bridgeH = Math.floor(clamp(p.h * 0.19, 60, 108));
    const bridge1Y = Math.floor(p.y + p.h * 0.13);
    const bridge2Y = Math.floor(p.y + p.h * 0.62);
    return {
      pitX,
      pitW,
      pitY: p.y,
      pitH: p.h,
      left: { x: p.x, y: p.y, w: pitX - p.x, h: p.h },
      right: { x: pitX + pitW, y: p.y, w: (p.x + p.w) - (pitX + pitW), h: p.h },
      bridges: [
        { x: pitX, y: bridge1Y, w: pitW, h: bridgeH },
        { x: pitX, y: bridge2Y, w: pitW, h: bridgeH }
      ]
    };
  }
  function getBridgesSide(x, b=getBridgesStageData()){
    if (!b) return "none";
    if (x < b.pitX) return "left";

    return "bridge";

  function chooseBridgeForCrossing(yA, yB, b=getBridgesStageData()){
    if (!b || !b.bridges || !b.bridges.length) return null;
    let best = b.bridges[0];
    let bestScore = Infinity;
    for (const bridge of b.bridges){
      const cy = bridge.y + bridge.h * 0.5;
      const score = Math.abs(yA - cy) + Math.abs(yB - cy);
      if (score < bestScore){
        bestScore = score;
        best = bridge;
      }
    }
    return best;
  }
  function getBridgeRoutePoint(u, fromX, fromY, towardX, towardY, b=getBridgesStageData()){
    if (!b) return null;
    const fromSide = getBridgesSide(fromX, b);
    const toSide = getBridgesSide(towardX, b);
    const bridge = chooseBridgeForCrossing(fromY, towardY, b);
    if (!bridge) return null;
    const cy = bridge.y + bridge.h * 0.5;
    const approach = u.r + 14;

    if (fromSide === "bridge"){
      if (toSide === "left") return { x: b.pitX - approach, y: cy, bridge, mode: "exit_left" };
      if (toSide === "right") return { x: b.pitX + b.pitW + approach, y: cy, bridge, mode: "exit_right" };
      return { x: b.pitX + b.pitW * 0.5, y: cy, bridge, mode: "hold_bridge" };
    }
    if (fromSide === "left" && toSide === "right"){
      return { x: b.pitX + Math.min(b.pitW * 0.5, game.maxMoveDist * 0.92), y: cy, bridge, mode: "cross_from_left" };
    }
    if (fromSide === "right" && toSide === "left"){
      return { x: b.pitX + b.pitW - Math.min(b.pitW * 0.5, game.maxMoveDist * 0.92), y: cy, bridge, mode: "cross_from_right" };
    }
    if (fromSide === "left"){
      return { x: b.pitX - approach, y: cy, bridge, mode: "approach_left" };
    }
    if (fromSide === "right"){
      return { x: b.pitX + b.pitW + approach, y: cy, bridge, mode: "approach_right" };
    }
    return null;
  }

  function isInsidePlatform(x, y){

      const m = Math.min(r1, r2);
      return Math.PI * m * m;
    }
    const x1 = clamp((d*d + r1*r1 - r2*r2) / (2 * d * r1), -1, 1);
    const x2 = clamp((d*d + r2*r2 - r1*r1) / (2 * d * r2), -1, 1);
    const a1 = r1*r1 * Math.acos(x1);
    const a2 = r2*r2 * Math.acos(x2);
    const a3 = 0.5 * Math.sqrt(
      Math.max(0, (-d + r1 + r2) * (d + r1 - r2) * (d - r1 + r2) * (d + r1 + r2))

  function circleRectOverlapArea(cx, cy, r, rx, ry, rw, rh){
    // Numeric overlap between a circle and axis-aligned rectangle via Simpson integration.
    const x1 = rx - cx;
    const x2 = (rx + rw) - cx;
    const y1 = ry - cy;
    const y2 = (ry + rh) - cy;
    const minX = Math.max(-r, x1);
    const maxX = Math.min(r, x2);
    if (maxX <= minX) return 0;

    const slices = 36; // even number required for Simpson.
    const dx = (maxX - minX) / slices;
    const verticalOverlap = (x) => {
      const yCap = Math.sqrt(Math.max(0, r*r - x*x));
      const low = Math.max(y1, -yCap);
      const high = Math.min(y2, yCap);
      return Math.max(0, high - low);

    let sum = verticalOverlap(minX) + verticalOverlap(maxX);
    for (let i = 1; i < slices; i++){

    for (const u of game.team2){

      if (d < nearest2) nearest2 = d;

      const rr = (ft.r + 6);
      for (const u of all){
        if (!u.alive) continue;
        const dx = ft.x - u.x;
        const dy = ft.y - u.y;
        const d2 = dx*dx + dy*dy;
        if (d2 <= (u.r + rr) * (u.r + rr) && d2 < bestD2){
          bestD2 = d2;
          best = u;
        }
      }
      if (best){
        setFootballCarrier(best);
        ft.stealCooldown = 0.12;
        ballPickupSound(false);
        carrier = best;
      }
    }

    if (carrier && ft.stealCooldown <= 0){
      let thief = null;
      let nearest = Infinity;
      const foes = (carrier.team === 1) ? game.team2 : game.team1;
      for (const o of foes){
        if (!o.alive) continue;
        const dx = o.x - carrier.x;
        const dy = o.y - carrier.y;
        const rr = o.r + carrier.r + 1.5;
        const d2 = dx*dx + dy*dy;
        if (d2 <= rr*rr && d2 < nearest){
          nearest = d2;
          thief = o;
        }
      }
      if (thief){
        setFootballCarrier(thief);
        ft.stealCooldown = 0.14;
        ballPickupSound(true);
        carrier = thief;
      }
    }

    if (carrier){
      ft.x = carrier.x;
      ft.y = carrier.y;
      if (isFootballMode()){
        const p = game.platform;
        const z = footballGoalLines(p);
        if (carrier.team === 1 && carrier.x >= z.right){
          footballScoreSound();
          endRound("player");
          return true;
        }
        if (carrier.team === 2 && carrier.x <= z.left){
          footballScoreSound();
          endRound("ai");
          return true;
        }
      }
    }
    return false;
  }
  function resolveKeepAwayTurnWin(){
    if (!isKeepAwayMode()) return false;
    const ka = game.keepAway;
    const carrier = getFootballCarrierUnit();

    if (!carrier){
      ka.streakTeam = 0;
      ka.streakCount = 0;
      return false;
    }

    if (ka.streakTeam === carrier.team){
      ka.streakCount++;
    } else {
      ka.streakTeam = carrier.team;
      ka.streakCount = 1;
    }

    if (ka.streakCount >= ka.targetStreak){
      endRound(carrier.team === 1 ? "player" : "ai");
      return true;
    }
    return false;
  }
  function hockeyResolveStep(all, dt){
    if (!isHockeyMode()) return false;
    const p = game.platform;
    const hk = game.hockey;
    const g = hockeyGoalMouth(p);
    const simdt = dt * 60;

    // Unit-to-puck collisions: players "shoot" by hitting the puck.
    for (let it = 0; it < 3; it++){
      for (const u of all){
        if (!u.alive) continue;
        resolveCircleCollision(u, hk);
      }
    }

    // Integrate puck with mild damping so it glides.
    hk.x += hk.vx * simdt;
    hk.y += hk.vy * simdt;
    hk.vx *= Math.pow(0.9915, Math.max(1, simdt * 0.5));
    hk.vy *= Math.pow(0.9915, Math.max(1, simdt * 0.5));
    if (Math.hypot(hk.vx, hk.vy) < 0.018){ hk.vx = 0; hk.vy = 0; }

    // Top/bottom boards.
    if (hk.y - hk.r < p.y){
      hk.y = p.y + hk.r;
      hk.vy = Math.abs(hk.vy) * 0.90;
      beep(270, 0.02, "square", 0.018);
    } else if (hk.y + hk.r > p.y + p.h){
      hk.y = p.y + p.h - hk.r;
      hk.vy = -Math.abs(hk.vy) * 0.90;
      beep(270, 0.02, "square", 0.018);
    }

    const inGoalY = hk.y >= g.top && hk.y <= g.bottom;
    // Left board / goal
    if (hk.x - hk.r < p.x){
      if (inGoalY){
        endRound("ai");
        return true;
      }
      hk.x = p.x + hk.r;
      hk.vx = Math.abs(hk.vx) * 0.90;
      beep(300, 0.02, "square", 0.02);
    }
    // Right board / goal
    if (hk.x + hk.r > p.x + p.w){
      if (inGoalY){
        endRound("player");
        return true;
      }
      hk.x = p.x + p.w - hk.r;
      hk.vx = -Math.abs(hk.vx) * 0.90;
      beep(300, 0.02, "square", 0.02);
    }

    // Goal-post feel: bounce off the board segments outside mouth.
    if ((hk.x - hk.r) < g.leftX && !inGoalY){
      hk.x = g.leftX + hk.r;
      hk.vx = Math.abs(hk.vx) * 0.88;
    } else if ((hk.x + hk.r) > g.rightX && !inGoalY){
      hk.x = g.rightX - hk.r;
      hk.vx = -Math.abs(hk.vx) * 0.88;
    }

    return false;
  }
  function aliveCount(arr){
    let c = 0;
    for (const u of arr) if (u.alive) c++;
    return c;
  }
  function allPlansReadyFor(units){
    for (const u of units){
      if (u.alive && !u.target) return false;

  function activePlanningTeam(){
    if (isSinglePlayerMode()) return game.team1;
    return (game.planOwner === 1) ? game.team1 : game.team2;
