  function clampPointToPlatformForUnit(u, x, y){
    const margin = u.r + 6;
    const p = game.platform;
    if (p.shape === "circle"){
      const dx = x - p.cx, dy = y - p.cy;
      const d = Math.hypot(dx, dy) || 1;
      const maxR = Math.max(0, p.radius - margin);
      if (d > maxR){
        const s = maxR / d;
        x = p.cx + dx * s;
        y = p.cy + dy * s;
      }
      return { x, y };
    }
    if (isBridgesStage()){
      const rects = getBridgesPlayableRects(margin);
      if (pointInAnyRect(x, y, rects)) return { x, y };
      return clampPointToRects(x, y, rects);
    }
    return {
      x: clamp(x, p.x + margin, p.x + p.w - margin),
      y: clamp(y, p.y + margin, p.y + p.h - margin)
    };
  }

  function getPathingWalls(){
    if (isDoorsStage() && game.phase === "plan"){
      return buildDoorsWallsForHalf(projectedDoorsOpenHalf());
    }
    return game.walls;
  }
  function isInsideWallForUnit(u, x, y, walls=getPathingWalls()){
    if (!walls || walls.length === 0) return false;
    const pad = u.r + 4;
    for (const w of walls){
      if (x >= (w.x - pad) && x <= (w.x + w.w + pad) &&
          y >= (w.y - pad) && y <= (w.y + w.h + pad)){
        return true;
      }
    }
    return false;
  }

  function segmentBlockedByWallsForUnit(u, x1, y1, x2, y2, walls=getPathingWalls()){
    if (!walls || walls.length === 0) return false;
    const pad = u.r + 4;
    for (const w of walls){
      const ww = { x: w.x - pad, y: w.y - pad, w: w.w + pad*2, h: w.h + pad*2 };
      if (segIntersectsRect(x1, y1, x2, y2, ww)) return true;
    }
    return false;
  }

  function segmentBlockedByBumpersForUnit(u, x1, y1, x2, y2){
    if (!game.bumpers || game.bumpers.length === 0) return false;
    for (const b of game.bumpers){
      const bb = { x: b.x, y: b.y, r: b.r + u.r + 6 };
      if (segIntersectsCircle(x1, y1, x2, y2, bb)) return true;
    }
    return false;
  }
  function isInsideBumperForUnit(u, x, y){
    if (!game.bumpers || game.bumpers.length === 0) return false;
    const pad = u.r + 6;
    for (const b of game.bumpers){
      const rr = b.r + pad;
      const dx = x - b.x;
      const dy = y - b.y;
      if (dx*dx + dy*dy <= rr*rr) return true;
    }
    return false;
  }

  function findAIMoveTarget(u, tx, ty){
    const bridgeSafetyDiff = DIFF[config.difficulty] || DIFF.NORMAL;
    const clampToMoveRange = (x, y) => {
      const dx = x - u.x;
      const dy = y - u.y;
      const dist = Math.hypot(dx, dy) || 1;
      if (dist <= game.maxMoveDist) return { x, y };
      const s = game.maxMoveDist / dist;
      return { x: u.x + dx * s, y: u.y + dy * s };
    };
    let desired = clampPointToPlatformForUnit(u, tx, ty);
    desired = applyAIBridgesSafety(u, desired, bridgeSafetyDiff);
    desired = applyAIDoorsSafety(u, desired, bridgeSafetyDiff);
    desired = clampToMoveRange(desired.x, desired.y);
    const pathBlocked = (x, y) => {
      if (isBridgesStage()){
        if (!pointInAnyRect(x, y, getBridgesPlayableRects(u.r + 6))) return true;
        if (segmentBlockedByPitForUnit(u, u.x, u.y, x, y)) return true;
      }
      if (config.stage === "WALLS"){
        if (isInsideWallForUnit(u, x, y)) return true;
        if (segmentBlockedByWallsForUnit(u, u.x, u.y, x, y)) return true;
      }
      if (config.stage === "BUMPER3"){
        if (isInsideBumperForUnit(u, x, y)) return true;
        if (segmentBlockedByBumpersForUnit(u, u.x, u.y, x, y)) return true;
      }
      return false;
    };

    const dx = desired.x - u.x;
    const dy = desired.y - u.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 1.5) return pathBlocked(desired.x, desired.y) ? { x: u.x, y: u.y } : desired;

    const baseA = Math.atan2(dy, dx);
    const angleOffsets = [0, 0.18, -0.18, 0.35, -0.35, 0.55, -0.55, 0.8, -0.8, 1.05, -1.05];
    const distScales = [1.0, 0.92, 0.82, 0.70, 0.56];
    let best = null;
    let bestScore = Infinity;

    for (const da of angleOffsets){
      for (const s of distScales){
        let cx = u.x + Math.cos(baseA + da) * dist * s;
        let cy = u.y + Math.sin(baseA + da) * dist * s;
        const clamped = clampPointToPlatformForUnit(u, cx, cy);
        cx = clamped.x; cy = clamped.y;
        const bridgeSafe = applyAIBridgesSafety(u, { x: cx, y: cy }, bridgeSafetyDiff);
        const doorSafe = applyAIDoorsSafety(u, bridgeSafe, bridgeSafetyDiff);
        cx = doorSafe.x; cy = doorSafe.y;

        if (pathBlocked(cx, cy)) continue;

        const score = Math.hypot(cx - desired.x, cy - desired.y) + Math.abs(da) * 140 + (1 - s) * 70;
        if (score < bestScore){
          bestScore = score;
          best = { x: cx, y: cy };
        }
      }
    }

    if (best) return best;

    if (isBridgesStage()){
      const route = getBridgeRoutePoint(u, u.x, u.y, desired.x, desired.y);
      if (route){
        const clampedRoute = clampToMoveRange(route.x, route.y);
        const bridgeTarget = applyAIBridgesSafety(u, clampPointToPlatformForUnit(u, clampedRoute.x, clampedRoute.y), bridgeSafetyDiff);
        if (!pathBlocked(bridgeTarget.x, bridgeTarget.y)) return bridgeTarget;

        const bridgeCenter = {
          x: route.bridge.x + route.bridge.w * 0.5,
          y: route.bridge.y + route.bridge.h * 0.5
        };
        const clampedCenter = clampToMoveRange(bridgeCenter.x, bridgeCenter.y);
        const centerTarget = applyAIBridgesSafety(u, clampPointToPlatformForUnit(u, clampedCenter.x, clampedCenter.y), bridgeSafetyDiff);
        if (!pathBlocked(centerTarget.x, centerTarget.y)) return centerTarget;
      }
    }
    if (isDoorsStage()){
      const route = getDoorsRoutePoint(u, desired.x, desired.y);
      if (route){
        const clampedRoute = clampToMoveRange(route.x, route.y);
        const doorTarget = applyAIDoorsSafety(u, clampPointToPlatformForUnit(u, clampedRoute.x, clampedRoute.y), bridgeSafetyDiff);
        if (!pathBlocked(doorTarget.x, doorTarget.y)) return doorTarget;
      }
    }

    if (config.stage === "WALLS"){
      const p = game.platform;
      const side = (u.x < p.cx) ? -1 : 1;
      const safeX = clamp(p.cx + side * (p.w * 0.22), p.x + u.r + 6, p.x + p.w - u.r - 6);
      const lanes = [p.y + p.h * 0.22, p.y + p.h * 0.78];
      for (const ly of lanes){
        const clamped = clampToMoveRange(safeX, ly);
        const c = clampPointToPlatformForUnit(u, clamped.x, clamped.y);
        if (!pathBlocked(c.x, c.y)){
          return c;
        }
      }
      {
        const clamped = clampToMoveRange(safeX, u.y);
        const c = clampPointToPlatformForUnit(u, clamped.x, clamped.y);
        if (!pathBlocked(c.x, c.y)) return c;
      }
    }

    if (config.stage === "BUMPER3"){
      const p = game.platform;
      const safeX = clamp(desired.x, p.x + u.r + 6, p.x + p.w - u.r - 6);
      const lanes = [p.y + p.h * 0.18, p.y + p.h * 0.34, p.y + p.h * 0.66, p.y + p.h * 0.82];
      for (const ly of lanes){
        const clamped = clampToMoveRange(safeX, ly);
        const c = clampPointToPlatformForUnit(u, clamped.x, clamped.y);
        if (!pathBlocked(c.x, c.y)){
          return c;
        }
      }
    }

    if (config.stage === "BUMPER3" && isInsideBumperForUnit(u, desired.x, desired.y)){
      const p = game.platform;
      const clamped = clampToMoveRange(p.cx, desired.y);
      const c = clampPointToPlatformForUnit(u, clamped.x, clamped.y);
      if (!pathBlocked(c.x, c.y)) return c;
    }

    // Radial search fallback: never return a blocked line if a nearby legal one exists.
    const probeAngles = [0, 0.40, -0.40, 0.78, -0.78, 1.18, -1.18, 1.50, -1.50];
    const probeScales = [0.85, 0.65, 0.45, 0.28];
    const probeBaseA = Math.atan2(dy || 0.0001, dx || 0.0001);
    const maxProbe = Math.max(24, game.maxMoveDist * 0.86);
    for (const s of probeScales){
      const pd = maxProbe * s;
      for (const a of probeAngles){
        const c = clampPointToPlatformForUnit(u, u.x + Math.cos(probeBaseA + a) * pd, u.y + Math.sin(probeBaseA + a) * pd);
        if (!pathBlocked(c.x, c.y)) return c;
      }
    }

    if (!pathBlocked(desired.x, desired.y)) return desired;
    return { x: u.x, y: u.y };
  }

  function applyAICircleSafety(u, target, diff){
    if (!isKnockoutMode() && !isKeepAwayMode()) return target;
    const p = game.platform;
    if (!p) return target;

    if (isBridgesStage()){
      return applyAIBridgesSafety(u, target, diff);
    }

    if (p.shape !== "circle"){
      // Rectangle knockout stages (classic/bumpers/walls): keep AI away from risky border hugging,
      // especially on higher difficulty to avoid accidental self-elims.
      const edgeSafety = clamp((diff && diff.edgeSafety) || 0, 0, 1);
      if (edgeSafety <= 0) return target;

      const margin = u.r + 6;
      const inset = (4 + Math.min(p.w, p.h) * 0.08) * edgeSafety;
      const minX = p.x + margin + inset;
      const maxX = p.x + p.w - margin - inset;
      const minY = p.y + margin + inset;
      const maxY = p.y + p.h - margin - inset;
      return {
        x: clamp(target.x, minX, maxX),
        y: clamp(target.y, minY, maxY)
      };
    }

    const safety = clamp((diff && diff.circleSafety) || 0, 0, 1);
    if (safety <= 0) return target;

    const margin = u.r + 6;
    const maxR = Math.max(0, p.radius - margin);
    if (maxR <= 1) return target;

    const ux = u.x - p.cx, uy = u.y - p.cy;
    const ud = Math.hypot(ux, uy) || 1;
    const nx = ux / ud, ny = uy / ud;

    let tx = target.x, ty = target.y;
    const mvx = tx - u.x, mvy = ty - u.y;
    const outward = mvx * nx + mvy * ny;

    // Near the edge, avoid plans that keep pushing outward.
    const edgeFrac = ud / maxR;
    if (edgeFrac > 0.78 && outward > 0){
      const inwardPush = outward * (0.72 + 0.24 * safety) + (8 + 16 * safety);
      tx -= nx * inwardPush;
      ty -= ny * inwardPush;
    }

    // Keep an inner safety band based on difficulty.
    const inset = (6 + p.radius * 0.20) * safety;
    const safeR = Math.max(0, maxR - inset);
    const dx = tx - p.cx, dy = ty - p.cy;
    const d = Math.hypot(dx, dy) || 1;
    if (d > safeR){
      const s = safeR / d;
      tx = p.cx + dx * s;
      ty = p.cy + dy * s;
    }
    return { x: tx, y: ty };
  }
  function applyAIBridgesSafety(u, target, diff){
    if (!isBridgesStage()) return target;
    const p = game.platform;
    const b = getBridgesStageData(p);
    if (!p || !b) return target;

    const safety = clamp((diff && diff.edgeSafety) || 0, 0, 1);
    const outerMargin = u.r + 8;
    const lipInset = 12 + safety * 16;
    let tx = target.x;
    let ty = target.y;
    const side = getBridgesSide(tx, b);

    if (side === "left"){
      tx = clamp(tx, p.x + outerMargin, b.pitX - outerMargin - lipInset);
      ty = clamp(ty, p.y + outerMargin, p.y + p.h - outerMargin);
      return { x: tx, y: ty };
    }
    if (side === "right"){
      tx = clamp(tx, b.pitX + b.pitW + outerMargin + lipInset, p.x + p.w - outerMargin);
      ty = clamp(ty, p.y + outerMargin, p.y + p.h - outerMargin);
      return { x: tx, y: ty };
    }

    let bridge = null;
    for (const r of b.bridges){
      if (ty >= r.y && ty <= (r.y + r.h)){
        bridge = r;
        break;
      }
    }
    if (!bridge) bridge = chooseBridgeForCrossing(u.y, ty, b) || b.bridges[0];

    const xInset = u.r + 8 + safety * 5;
    const yInset = u.r + 8 + safety * 8;
    const cy = bridge.y + bridge.h * 0.5;
    tx = clamp(tx, bridge.x + xInset, bridge.x + bridge.w - xInset);
    ty = clamp(lerp(ty, cy, 0.40 + safety * 0.32), bridge.y + yInset, bridge.y + bridge.h - yInset);
    return { x: tx, y: ty };
  }
  function getDoorsOpenLaneCenter(openHalf=projectedDoorsOpenHalf(), p=game.platform){
    const d = getDoorsStageData(p);
    if (!d) return { x: p.cx, y: p.cy };
    const lane = (openHalf === "TOP") ? d.topOpen : d.botOpen;
    return {
      x: lane.x + lane.w * 0.5,
      y: lane.y + lane.h * 0.5
    };
  }
  function getDoorsRoutePoint(u, towardX, towardY, openHalf=projectedDoorsOpenHalf(), p=game.platform){
    const d = getDoorsStageData(p);
    if (!d) return null;
    const lane = (openHalf === "TOP") ? d.topOpen : d.botOpen;
    const side = towardX < p.cx ? -1 : 1;
    const approach = u.r + 14;
    const targetSide = towardY < (p.y + p.h * 0.5) ? "TOP" : "BOTTOM";
    const laneCenter = getDoorsOpenLaneCenter(openHalf, p);
    if (targetSide === openHalf){
      return {
        x: p.cx + side * Math.min(d.channelW * 0.45, approach),
        y: clamp(towardY, lane.y + u.r + 8, lane.y + lane.h - u.r - 8),
        mode: "lane_cross"
      };
    }
    return {
      x: p.cx + side * approach,
      y: laneCenter.y,
      mode: "lane_approach"
    };
  }
  function applyAIDoorsSafety(u, target, diff){
    if (!isDoorsStage()) return target;
    const p = game.platform;
    const d = getDoorsStageData(p);
    if (!p || !d) return target;
    const safety = clamp((diff && diff.edgeSafety) || 0, 0, 1);
    const margin = u.r + 8;
    const lane = projectedDoorsOpenHalf() === "TOP" ? d.topOpen : d.botOpen;
    let tx = clamp(target.x, p.x + margin, p.x + p.w - margin);
    let ty = clamp(target.y, p.y + margin, p.y + p.h - margin);

    const blockedHalf = projectedDoorsOpenHalf() === "TOP" ? d.botDoor : d.topDoor;
    if (tx >= blockedHalf.x - margin && tx <= blockedHalf.x + blockedHalf.w + margin &&
        ty >= blockedHalf.y - margin && ty <= blockedHalf.y + blockedHalf.h + margin){
      const route = getDoorsRoutePoint(u, tx, ty, projectedDoorsOpenHalf(), p);
      if (route){
        tx = route.x;
        ty = route.y;
      }
    }

    const lanePull = clamp(0.18 + safety * 0.28, 0.18, 0.44);
    if (Math.abs(tx - p.cx) < d.channelW * 0.85){
      ty = lerp(ty, lane.y + lane.h * 0.5, lanePull);
      ty = clamp(ty, lane.y + margin, lane.y + lane.h - margin);
    }
    return { x: tx, y: ty };
  }

  function aiPlanTargets(){
    const diffBase = DIFF[config.difficulty] || DIFF.NORMAL;
    const aiMod = getAIModifierTuning();
    const diff = {
      ...diffBase,
      edgeSafety: clamp(diffBase.edgeSafety + aiMod.edgeSafetyAdd, 0, 1),
      circleSafety: clamp(diffBase.circleSafety + aiMod.edgeSafetyAdd * 0.9, 0, 1)
    };
    for (const a of game.team2){
      a.aiPersonality = null;
      a.aiDecisionTag = null;
      a.aiKOChance = null;
      a.aiRiskChance = null;
    }
    if (isKeepAwayMode()){
      const p = game.platform;
      const carrier = getFootballCarrierUnit();
      const centerBias = { x: p.cx, y: p.cy };

      for (const a of game.team2){
        if (!a.alive){ a.target = null; continue; }
        let tx = a.x;
        let ty = a.y;

        if (carrier && carrier.team === 2){
          // AI has possession: carrier runs away from nearest threat; teammates provide outlets.
          if (a === carrier){
            let nearest = null;
            let nd2 = Infinity;
            for (const o of game.team1){
              if (!o.alive) continue;
              const d2 = (o.x - a.x) * (o.x - a.x) + (o.y - a.y) * (o.y - a.y);
              if (d2 < nd2){ nd2 = d2; nearest = o; }
            }
            if (nearest){
              const away = normalize(a.x - nearest.x, a.y - nearest.y);
              const carryStride = game.maxMoveDist * clamp(0.62 * aiMod.attackDistMul, 0.44, 0.72);
              tx = a.x + away.x * carryStride + rand(-14, 14);
              ty = a.y + away.y * carryStride + rand(-14, 14);
            } else {
              tx = centerBias.x + rand(-p.w * 0.16, p.w * 0.16);
              ty = centerBias.y + rand(-p.h * 0.16, p.h * 0.16);
            }

            // Keep Away carrier safety:
            // pull inward near edges and suppress outward plans to avoid self-elims.
            let edgeRisk = 0;
            if (p.shape === "circle"){
              const ux = a.x - p.cx, uy = a.y - p.cy;
              const edgeR = Math.max(1, p.radius - a.r - 4);
              const edgeFrac = Math.hypot(ux, uy) / edgeR;
              edgeRisk = clamp((edgeFrac - 0.70) / 0.25, 0, 1);
            } else {
              const minEdge = Math.min(
                a.x - (p.x + a.r),
                (p.x + p.w - a.r) - a.x,
                a.y - (p.y + a.r),
                (p.y + p.h - a.r) - a.y
              );
              const edgeBand = 18 + Math.min(p.w, p.h) * 0.08;
              edgeRisk = clamp(1 - (minEdge / edgeBand), 0, 1);
            }

            if (edgeRisk > 0){
              const inwardPull = 0.52 + edgeRisk * 0.38;
              tx = lerp(tx, p.cx, inwardPull);
              ty = lerp(ty, p.cy, inwardPull);
            }

            const fromCenterX = a.x - p.cx, fromCenterY = a.y - p.cy;
            const fromCenterD = Math.hypot(fromCenterX, fromCenterY);
            if (fromCenterD > 1){
              const nx = fromCenterX / fromCenterD;
              const ny = fromCenterY / fromCenterD;
              const mvx = tx - a.x, mvy = ty - a.y;
              const outward = mvx * nx + mvy * ny;
              if (outward > 0){
                const cut = outward * (0.86 + 0.12 * diff.edgeSafety) + 10 * edgeRisk;
                tx -= nx * cut;
                ty -= ny * cut;
              }
            }

            if (p.shape === "circle"){
              const dx = tx - p.cx, dy = ty - p.cy;
              const d = Math.hypot(dx, dy) || 1;
              const safeR = Math.max(0, p.radius - a.r - (18 + p.radius * 0.18));
              if (d > safeR){
                const s = safeR / d;
                tx = p.cx + dx * s;
                ty = p.cy + dy * s;
              }
            } else {
              const safeInset = 20 + Math.min(p.w, p.h) * 0.10;
              tx = clamp(tx, p.x + a.r + safeInset, p.x + p.w - a.r - safeInset);
              ty = clamp(ty, p.y + a.r + safeInset, p.y + p.h - a.r - safeInset);
            }
          } else {
            const offset = (a.y <= carrier.y) ? -1 : 1;
            tx = carrier.x - p.w * 0.10 * aiMod.supportOffsetMul + rand(-22, 22);
            ty = carrier.y + offset * p.h * 0.14 * aiMod.supportOffsetMul + rand(-16, 16);
          }
        } else if (carrier && carrier.team === 1){
          // Player has possession: collapse and intercept.
          const readJitter = diff.aimJitter * (0.20 + diff.leadJitter * 0.26);
          const chaseLerp = clamp((0.72 + diff.intercept * 0.18) * aiMod.chaseCommit, 0.58, 0.92);
          const cx = lerp(a.x, carrier.x, chaseLerp);
          const cy = lerp(a.y, carrier.y, chaseLerp);
          tx = cx + rand(-readJitter, readJitter);
          ty = cy + rand(-readJitter, readJitter);
        } else {
          // Loose ball: converge quickly.
          tx = game.football.x + rand(-diff.aimJitter * 0.30, diff.aimJitter * 0.30);
          ty = game.football.y + rand(-diff.aimJitter * 0.30, diff.aimJitter * 0.30);
        }

        if (aiMod.centerBias > 0){
          const pull = clamp(aiMod.centerBias * 0.22, 0, 0.12);
          tx = lerp(tx, p.cx, pull);
          ty = lerp(ty, p.cy, pull);
        }

        let safe = findAIMoveTarget(a, tx, ty);
        safe = applyAICircleSafety(a, safe, diff);
        a.target = { x: safe.x, y: safe.y };
      }
      return;
    }

    if (isFootballMode()){
      const p = game.platform;
      const carrier = getFootballCarrierUnit();
      for (const a of game.team2){
        if (!a.alive){ a.target = null; continue; }

        let tx = a.x;
        let ty = a.y;

        if (carrier && carrier.team === 2){
          // Ball carrier runs to the left end zone; teammates screen nearby lanes.
          if (a === carrier){
            const z = footballGoalLines(p);
            tx = p.x + z.ez * 0.50;
            ty = clamp(
              a.y + rand(-p.h * 0.18 * aiMod.supportOffsetMul, p.h * 0.18 * aiMod.supportOffsetMul),
              p.y + a.r + 8, p.y + p.h - a.r - 8
            );
          } else {
            tx = carrier.x - p.w * 0.10 * aiMod.supportOffsetMul + rand(-26, 26);
            ty = carrier.y + rand(-p.h * 0.20 * aiMod.supportOffsetMul, p.h * 0.20 * aiMod.supportOffsetMul);
          }
        } else if (carrier && carrier.team === 1){
          // Chase the opponent carrier by anticipating likely scoring lanes,
          // not by reading the exact clicked target.
          const z = footballGoalLines(p);
          const goalX = z.right + z.ez * 0.20;
          const towardGoal = clamp((0.38 + diff.intercept * 0.34) * aiMod.lookaheadMul, 0.34, 0.75);
          const cx = lerp(carrier.x, goalX, towardGoal);
          const laneBias = (a.y - p.cy) * 0.16;
          const cy = carrier.y + laneBias + rand(-p.h * 0.06, p.h * 0.06);

          const readJitter = diff.aimJitter * (0.28 + diff.leadJitter * 0.40);
          tx = cx + rand(-readJitter, readJitter);
          ty = cy + rand(-readJitter * 1.2, readJitter * 1.2);
        } else {
          // Loose ball: converge to center ball position.
          tx = game.football.x + rand(-diff.aimJitter * 0.45, diff.aimJitter * 0.45);
          ty = game.football.y + rand(-diff.aimJitter * 0.45, diff.aimJitter * 0.45);
        }

        const safe = findAIMoveTarget(a, tx, ty);
        a.target = { x: safe.x, y: safe.y };
      }
      return;
    }
    if (isHockeyMode()){
      const p = game.platform;
      const hk = game.hockey;
      const g = hockeyGoalMouth(p);
      // Team 2 (AI/red) scores in the left goal.
      const attackGoalX = p.x + hk.r + 2;
      const defendGoalX = p.x + p.w - hk.r - 2;
      const goalYCenter = (g.top + g.bottom) * 0.5;

      const puckSpeed = Math.hypot(hk.vx, hk.vy);
      const puckLeadT = clamp(0.10 + diff.intercept * 0.20 + puckSpeed * 0.018, 0.10, 0.34);
      const puckLeadNoise = clamp(diff.aimJitter * (0.035 + diff.leadJitter * 0.055), 0, 9.5);
      const puckPX = clamp(
        hk.x + hk.vx * 60 * puckLeadT + rand(-puckLeadNoise, puckLeadNoise),
        p.x + hk.r + 2, p.x + p.w - hk.r - 2
      );
      const puckPY = clamp(
        hk.y + hk.vy * 60 * puckLeadT + rand(-puckLeadNoise, puckLeadNoise),
        p.y + hk.r + 2, p.y + p.h - hk.r - 2
      );

      const aliveAI = game.team2.filter(u => u.alive);
      if (!aliveAI.length) return;
      const ranked = [...aliveAI].sort((a, b) =>
        Math.hypot(a.x - puckPX, a.y - puckPY) - Math.hypot(b.x - puckPX, b.y - puckPY)
      );
      const striker = ranked[0];
      const wing = ranked[1] || null;
      const anchor = ranked[2] || wing || striker;

      // Read player pressure near the AI scoring goal to pick cleaner lanes.
      let topPressure = 0, botPressure = 0;
      for (const o of game.team1){
        if (!o.alive || o.x > p.x + p.w * 0.44) continue;
        if (o.y < p.cy) topPressure++;
        else botPressure++;
      }
      const lessCrowdedSign = (topPressure > botPressure) ? 1 : -1;

      const pickGoalY = (baseY, laneBias=0) => {
        const y = baseY + laneBias + rand(-p.h * 0.012, p.h * 0.012);
        return clamp(y, g.top + hk.r + 5, g.bottom - hk.r - 5);
      };

      const planPuckHit = (u, towardX, towardY, aggressive=false) => {
        const shot = normalize(towardX - puckPX, towardY - puckPY);
        const behindDist = (u.r + hk.r) + (aggressive ? 5 : 10);
        const behindX = puckPX - shot.x * behindDist;
        const behindY = puckPY - shot.y * behindDist;
        const alignDot = (u.x - puckPX) * shot.x + (u.y - puckPY) * shot.y;
        const linedUp = alignDot < -((u.r + hk.r) * 0.22);
        const toBehind = Math.hypot(behindX - u.x, behindY - u.y);

        let tx, ty;
        if (linedUp && toBehind < p.w * 0.33){
          const smash = game.maxMoveDist * (aggressive ? 1.02 : 0.88);
          tx = puckPX + shot.x * smash;
          ty = puckPY + shot.y * smash;
        } else {
          tx = behindX + rand(-8, 8);
          ty = behindY + rand(-8, 8);
        }
        return clampPointToPlatformForUnit(u, tx, ty);
      };

      const nearTop = puckPY < p.y + p.h * 0.18;
      const nearBottom = puckPY > p.y + p.h * 0.82;
      const rightHalf = puckPX > p.x + p.w * 0.56;
      const rightCorner = puckPX > p.x + p.w * 0.68 && (nearTop || nearBottom);
      const loosePuckDanger = rightHalf && (hk.vx > 0.10 || puckSpeed < 0.20);

      for (const a of game.team2){
        if (!a.alive){ a.target = null; continue; }
        let safe;

        if (a === striker){
          if (rightCorner){
            const clearY = pickGoalY(p.cy + (nearTop ? p.h * 0.16 : -p.h * 0.16));
            safe = planPuckHit(a, p.x + p.w * 0.34, clearY, true);
          } else {
            const laneY = pickGoalY(
              lerp(puckPY, goalYCenter, 0.26),
              lessCrowdedSign * p.h * 0.05
            );
            safe = planPuckHit(a, attackGoalX, laneY, true);
          }
        } else if (a === wing){
          if (rightHalf){
            const side = (striker.y <= p.cy) ? 1 : -1;
            const helpY = pickGoalY(goalYCenter + side * p.h * 0.18, side * p.h * 0.05);
            safe = planPuckHit(a, p.x + p.w * 0.30, helpY, false);
          } else {
            const reboundX = puckPX + p.w * 0.10;
            const reboundY = pickGoalY(lerp(puckPY, goalYCenter, 0.40), lessCrowdedSign * p.h * 0.08);
            safe = clampPointToPlatformForUnit(a, reboundX + rand(-10, 10), reboundY + rand(-10, 10));
          }
        } else if (a === anchor){
          let threat = null;
          let td = Infinity;
          for (const o of game.team1){
            if (!o.alive) continue;
            const d = (o.x - puckPX) * (o.x - puckPX) + (o.y - puckPY) * (o.y - puckPY);
            if (d < td){ td = d; threat = o; }
          }

          let tx, ty;
          if (loosePuckDanger){
            if (threat){
              tx = lerp(defendGoalX - p.w * 0.10, threat.x, 0.38);
              ty = lerp(goalYCenter, threat.y, 0.58);
            } else {
              tx = defendGoalX - p.w * 0.10;
              ty = goalYCenter;
            }
          } else {
            tx = p.x + p.w * 0.58;
            ty = pickGoalY(lerp(goalYCenter, puckPY, 0.24));
          }
          safe = clampPointToPlatformForUnit(a, tx + rand(-12, 12), ty + rand(-12, 12));
        } else {
          safe = clampPointToPlatformForUnit(a, p.x + p.w * 0.56, goalYCenter);
        }

        a.target = { x: safe.x, y: safe.y };
      }
      return;
    }

    const livingOpp = game.team1.filter(u => u.alive);
    const livingAI = game.team2.filter(u => u.alive);
    for (const a of game.team2){
      a.aiPersonality = null;
      a.aiDecisionTag = null;
      a.aiKOChance = null;
      a.aiRiskChance = null;
      if (!a.alive) a.target = null;
    }
    if (livingOpp.length === 0 || livingAI.length === 0) return;

    const p = game.platform;
    const totalAIUnits = Math.max(1, game.team2.length);
    // Knockout clutch mode: if AI is down to 1-2 of 5, bias toward aggressive elimination plays.
    const knockoutClutchAggro = (
      isKnockoutMode() &&
      totalAIUnits >= 5 &&
      livingAI.length <= 2
    ) ? (livingAI.length === 1 ? 1.0 : 0.62) : 0;

    // Internal AI knobs derived from existing DIFF values.
    const isEasy = config.difficulty === "EASY";
    const isNormal = config.difficulty === "NORMAL";
    const isHard = config.difficulty === "HARD";
    const AI_PERSONALITY_PROFILES = Object.freeze({
      STANDARD: { name: "standard", attack: 1.00, finish: 1.00, protect: 1.00, predict: 1.00, guard: 1.00, risk: 1.00, center: 1.00, assignVulnerability: 1.00, assignDanger: 1.00, claim: 1.00, laneBlock: 1.00, refine: 0, pressure: 1.00 },
      AGGRESSIVE: { name: "aggressive", attack: 1.42, finish: 1.52, protect: 0.62, predict: 1.18, guard: 0.84, risk: 0.72, center: 0.78, assignVulnerability: 1.38, assignDanger: 1.18, claim: 0.80, laneBlock: 1.12, refine: 2, pressure: 1.28 },
      DEFENDER: { name: "defender", attack: 0.88, finish: 0.82, protect: 1.38, predict: 1.02, guard: 1.34, risk: 1.18, center: 1.08, assignVulnerability: 0.84, assignDanger: 1.28, claim: 1.10, laneBlock: 1.22, refine: 1, pressure: 0.94 },
      PREDICTOR: { name: "predictor", attack: 1.02, finish: 1.00, protect: 0.96, predict: 1.44, guard: 1.08, risk: 1.02, center: 0.98, assignVulnerability: 0.96, assignDanger: 1.16, claim: 0.96, laneBlock: 1.38, refine: 2, pressure: 1.06 },
      BALANCED: { name: "balanced", attack: 1.04, finish: 1.02, protect: 1.06, predict: 1.06, guard: 1.06, risk: 1.00, center: 1.04, assignVulnerability: 1.00, assignDanger: 1.00, claim: 1.00, laneBlock: 1.04, refine: 1, pressure: 1.02 }
    });
    const NORMAL_PERSONALITY_PATTERN = Object.freeze(["AGGRESSIVE", "BALANCED", "AGGRESSIVE", "BALANCED", "BALANCED"]);
    const HARD_PERSONALITY_PATTERN = Object.freeze(["AGGRESSIVE", "DEFENDER", "PREDICTOR", "BALANCED", "AGGRESSIVE"]);

    let candidatesCount = clamp(Math.round(
      6 +
      diff.intercept * 10 +
      (70 - Math.min(70, diff.aimJitter)) * 0.08 +
      (diff.pressure - 1) * 5
    ), 5, 17);
    let lookahead = clamp(0.22 + diff.intercept * 0.62 - diff.leadJitter * 0.20, 0.20, 0.82);
    let coordStrength = clamp(
      0.16 + diff.intercept * 0.72 + diff.edgeSafety * 0.34 - diff.aimJitter / 280,
      0.08, 0.95
    );
    let spacingStrength = clamp(
      0.10 + diff.intercept * 0.64 + (diff.pressure - 1) * 0.42,
      0.06, 0.82
    );
    let randomness = clamp(
      diff.aimJitter / 300 + diff.leadJitter * 0.22 + (1 - diff.intercept) * 0.08,
      0.05, 0.46
    );
    if (isEasy){
      candidatesCount = Math.max(5, candidatesCount - 2);
      lookahead = clamp(lookahead - 0.05, 0.16, 0.80);
      coordStrength = clamp(coordStrength - 0.10, 0.06, 0.90);
      spacingStrength = clamp(spacingStrength - 0.08, 0.05, 0.80);
      randomness = clamp(randomness * 1.16, 0.08, 0.52);
    } else if (isNormal){
      candidatesCount = Math.min(18, candidatesCount + 2);
      lookahead = clamp(lookahead + 0.07, 0.22, 0.90);
      coordStrength = clamp(coordStrength + 0.10, 0.10, 0.97);
      spacingStrength = clamp(spacingStrength + 0.09, 0.08, 0.90);
      randomness = clamp(randomness * 0.84, 0.03, 0.40);
    } else if (isHard){
      candidatesCount = Math.min(24, candidatesCount + 9);
      lookahead = clamp(lookahead + 0.25, 0.34, 0.98);
      coordStrength = clamp(coordStrength + 0.28, 0.20, 0.995);
      spacingStrength = clamp(spacingStrength + 0.20, 0.14, 0.96);
      randomness = clamp(randomness * 0.34, 0.005, 0.20);
    }
    candidatesCount = clamp(Math.round(candidatesCount + aiMod.candidatesDelta), 5, 24);
    lookahead = clamp(lookahead * aiMod.lookaheadMul, 0.16, 0.97);
    coordStrength = clamp(coordStrength + aiMod.coordAdd, 0.06, 0.99);
    spacingStrength = clamp(spacingStrength + aiMod.spacingAdd, 0.05, 0.95);
    randomness = clamp(randomness + aiMod.randomnessAdd, 0.01, 0.55);
    if (knockoutClutchAggro > 0){
      candidatesCount = clamp(Math.round(candidatesCount + 4 + 4 * knockoutClutchAggro), 5, 24);
      lookahead = clamp(lookahead + 0.08 + 0.09 * knockoutClutchAggro, 0.16, 0.97);
      coordStrength = clamp(coordStrength + 0.05 + 0.05 * knockoutClutchAggro, 0.06, 0.99);
      spacingStrength = clamp(spacingStrength - (0.10 + 0.12 * knockoutClutchAggro), 0.05, 0.95);
      randomness = clamp(randomness * (1 - (0.18 + 0.18 * knockoutClutchAggro)), 0.01, 0.55);
    }

    const edgeRef = (p.shape === "circle")
      ? Math.max(26, p.radius * 0.28)
      : Math.max(26, Math.min(p.w, p.h) * 0.24);

    const pointSegData = (x1, y1, x2, y2, px, py) => {
      const vx = x2 - x1;
      const vy = y2 - y1;
      const vv = vx * vx + vy * vy;
      let t = (vv > 1e-6) ? ((px - x1) * vx + (py - y1) * vy) / vv : 0;
      t = clamp(t, 0, 1);
      const sx = x1 + vx * t;
      const sy = y1 + vy * t;
      const dx = px - sx;
      const dy = py - sy;
      return { t, sx, sy, d2: dx * dx + dy * dy };
    };
    const estimateKOCandidateChance = (a, cand, opp, meta, moveDir, moveLen) => {
      const pred = meta.pred;
      const hit = pointSegData(a.x, a.y, cand.x, cand.y, pred.x, pred.y);
      const hitR = a.r + opp.r + 9 + diff.intercept * 7;
      if (hit.d2 > hitR * hitR){
        return {
          chance: 0,
          koPotential: 0,
          towardOut: 0,
          edgeSwing: 0,
          contactChance: 0
        };
      }

      const contactChance = clamp(1 - Math.sqrt(hit.d2) / hitR, 0, 1);
      const toEnemy = normalize(pred.x - a.x, pred.y - a.y);
      const pushDir = normalize(moveDir.x * 0.72 + toEnemy.x * 0.28, moveDir.y * 0.72 + toEnemy.y * 0.28);
      const pushAmt = 10 + moveLen * 0.36;
      const eFuture = clampPointToPlatformForUnit(opp, pred.x + pushDir.x * pushAmt, pred.y + pushDir.y * pushAmt);
      const eRawFuture = edgeInfoFor(opp, pred.x + pushDir.x * pushAmt, pred.y + pushDir.y * pushAmt);
      const eNowEdge = meta.eEdge;
      const eFutureEdge = edgeInfoFor(opp, eFuture.x, eFuture.y);
      const towardOut = Math.max(0, pushDir.x * eNowEdge.nx + pushDir.y * eNowEdge.ny);
      const edgeSwing = clamp((eNowEdge.dist - eFutureEdge.dist) / Math.max(8, edgeRef * 0.70), -1, 1);
      const edgePressure = clamp(1 - eNowEdge.dist / Math.max(10, edgeRef * 0.82), 0, 1);
      const koPotential = clamp((-eRawFuture.dist + 4) / Math.max(8, opp.r + 8), 0, 1);
      const chance = clamp(
        koPotential * 0.52 +
        contactChance * 0.16 +
        towardOut * 0.14 +
        Math.max(0, edgeSwing) * 0.10 +
        edgePressure * 0.08,
        0, 1
      );
      return { chance, koPotential, towardOut, edgeSwing, contactChance };
    };

    const edgeInfoFor = (u, x, y) => {
      const margin = u.r + 6;
      if (p.shape === "circle"){
        const dx = x - p.cx;
        const dy = y - p.cy;
        const d = Math.hypot(dx, dy) || 1;
        const raw = p.radius - d;
        return { dist: raw - margin, nx: dx / d, ny: dy / d };
      }
      if (isBridgesStage()){
        const b = getBridgesStageData(p);
        let dist = x - p.x - margin;
        let nx = -1, ny = 0;

        const candidates = [
          { dist: x - p.x - margin, nx: -1, ny: 0 },
          { dist: (p.x + p.w) - x - margin, nx: 1, ny: 0 },
          { dist: y - p.y - margin, nx: 0, ny: -1 },
          { dist: (p.y + p.h) - y - margin, nx: 0, ny: 1 }
        ];

        const onBridgeBand = b.bridges.some(r => y >= r.y && y <= (r.y + r.h));
        if (x < b.pitX && !onBridgeBand){
          candidates.push({ dist: b.pitX - x, nx: 1, ny: 0 });
        } else if (x > (b.pitX + b.pitW) && !onBridgeBand){
          candidates.push({ dist: x - (b.pitX + b.pitW), nx: -1, ny: 0 });
        } else if (x >= b.pitX && x <= (b.pitX + b.pitW)){
          for (const r of b.bridges){
            if (y >= r.y && y <= (r.y + r.h)){
              candidates.push({ dist: y - r.y, nx: 0, ny: -1 });
              candidates.push({ dist: (r.y + r.h) - y, nx: 0, ny: 1 });
              break;
            }
          }
        }

        for (const c of candidates){
          if (c.dist < dist){
            dist = c.dist;
            nx = c.nx;
            ny = c.ny;
          }
        }
        return { dist, nx, ny };
      }
      const dl = x - p.x - margin;
      const dr = (p.x + p.w) - x - margin;
      const dt = y - p.y - margin;
      const db = (p.y + p.h) - y - margin;
      let dist = dl, nx = -1, ny = 0;
      if (dr < dist){ dist = dr; nx = 1; ny = 0; }
      if (dt < dist){ dist = dt; nx = 0; ny = -1; }
      if (db < dist){ dist = db; nx = 0; ny = 1; }
      return { dist, nx, ny };
    };

    const centerScore = (u, x, y) => {
      if (p.shape === "circle"){
        const maxR = Math.max(1, p.radius - (u.r + 6));
        const d = Math.hypot(x - p.cx, y - p.cy);
        return clamp(1 - (d / maxR), 0, 1);
      }
      const rx = Math.max(1, p.w * 0.5 - (u.r + 6));
      const ry = Math.max(1, p.h * 0.5 - (u.r + 6));
      const nx = Math.abs(x - p.cx) / rx;
      const ny = Math.abs(y - p.cy) / ry;
      return clamp(1 - Math.max(nx, ny), 0, 1);
    };
    const bridges = isBridgesStage() ? getBridgesStageData(p) : null;
    const doors = isDoorsStage() ? getDoorsStageData(p) : null;
    const bridgeSideFor = (x) => bridges ? getBridgesSide(x, bridges) : "flat";
    const bridgeChoiceFor = (yA, yB) => bridges ? chooseBridgeForCrossing(yA, yB, bridges) : null;
    const bridgeMouthPoint = (side, bridge, inset=0) => {
      if (!bridges || !bridge) return { x: p.cx, y: p.cy };
      const pad = inset;
      return {
        x: (side === "left")
          ? (bridges.pitX - pad)
          : (bridges.pitX + bridges.pitW + pad),
        y: bridge.y + bridge.h * 0.5
      };
    };
    const routeViaBridge = (u, tx, ty) => {
      if (!bridges) return { x: tx, y: ty };
      const route = getBridgeRoutePoint(u, u.x, u.y, tx, ty, bridges);
      if (!route) return { x: tx, y: ty };
      return { x: route.x, y: route.y, bridge: route.bridge, mode: route.mode };
    };
    const projectedDoorHalf = projectedDoorsOpenHalf();
    const doorLaneCenter = doors ? getDoorsOpenLaneCenter(projectedDoorHalf, p) : { x: p.cx, y: p.cy };
    const routeViaDoor = (u, tx, ty) => {
      if (!doors) return { x: tx, y: ty };
      const route = getDoorsRoutePoint(u, tx, ty, projectedDoorHalf, p);
      if (!route) return { x: tx, y: ty };
      return { x: route.x, y: route.y, mode: route.mode };
    };
    const safeAnchorFor = (u) => {
      let anchor = { x: p.cx, y: p.cy };
      if (bridges){
        const side = bridgeSideFor(u.x);
        if (side === "left") anchor = { x: bridges.pitX - Math.max(28, u.r + 18), y: p.cy };
        else if (side === "right") anchor = { x: bridges.pitX + bridges.pitW + Math.max(28, u.r + 18), y: p.cy };
      } else if (doors){
        anchor = { x: p.cx, y: doorLaneCenter.y };
      }
      return clampPointToPlatformForUnit(u, anchor.x, anchor.y);
    };

    const enemyIds = new Map();
    for (let i = 0; i < livingOpp.length; i++) enemyIds.set(livingOpp[i], i);

    const enemyMeta = new Map();
    const predNoise = diff.aimJitter * (0.03 + diff.leadJitter * 0.06) * (0.48 + randomness * 0.8);

    for (const opp of livingOpp){
      let px = opp.x;
      let py = opp.y;
      let intentDirX = 0;
      let intentDirY = 0;
      let intentMag = 0;
      let intentEndX = opp.x;
      let intentEndY = opp.y;
      if (opp.target && isPointInsideArenaForRender(opp.target.x, opp.target.y)){
        const ivx = opp.target.x - opp.x;
        const ivy = opp.target.y - opp.y;
        const ilen = Math.hypot(ivx, ivy) || 1;
        intentMag = clamp(ilen / Math.max(1, game.maxMoveDist), 0, 1);
        intentDirX = ivx / ilen;
        intentDirY = ivy / ilen;
        const tLead = clamp(lookahead + diff.intercept * 0.18, 0.16, 0.92);
        px = lerp(opp.x, opp.target.x, tLead);
        py = lerp(opp.y, opp.target.y, tLead);
        const tIntent = clamp(0.30 + lookahead * 0.48 + diff.intercept * 0.14, 0.30, 0.94);
        intentEndX = lerp(opp.x, opp.target.x, tIntent);
        intentEndY = lerp(opp.y, opp.target.y, tIntent);
      }
      px += rand(-predNoise, predNoise);
      py += rand(-predNoise, predNoise);
      const pred = clampPointToPlatformForUnit(opp, px, py);
      const eEdge = edgeInfoFor(opp, pred.x, pred.y);
      const vulnerability = clamp(1 - (eEdge.dist / edgeRef), 0, 1);
      let danger = vulnerability * 0.45;
      if (opp.target){
        const mdx = opp.target.x - opp.x;
        const mdy = opp.target.y - opp.y;
        const outward = Math.max(0, (mdx * eEdge.nx + mdy * eEdge.ny) / Math.max(1, game.maxMoveDist));
        danger += outward * 0.72;
      }
      danger += intentMag * 0.20;
      const intentEnd = clampPointToPlatformForUnit(opp, intentEndX, intentEndY);
      const bridgeSide = bridgeSideFor(pred.x);
      const targetBridge = bridges ? bridgeChoiceFor(opp.y, intentEnd.y) : null;
      const intentDoorHalf = doors ? (intentEnd.y < p.cy ? "TOP" : "BOTTOM") : null;
      enemyMeta.set(opp, {
        pred,
        eEdge,
        vulnerability,
        danger,
        intentDir: { x: intentDirX, y: intentDirY },
        intentMag,
        intentEnd,
        bridgeSide,
        targetBridge,
        intentDoorHalf
      });
    }

    const estimateSelfKOCandidateChance = (a, cand, moveDir, moveLen) => {
      const selfEdgeNow = edgeInfoFor(a, a.x, a.y);
      const selfEdgeEnd = edgeInfoFor(a, cand.x, cand.y);
      const outwardSelf = Math.max(0, (moveDir.x * selfEdgeEnd.nx + moveDir.y * selfEdgeEnd.ny));
      const edgePressure = clamp(1 - selfEdgeEnd.dist / Math.max(10, edgeRef * 0.82), 0, 1);
      const edgeWorsen = clamp((selfEdgeNow.dist - selfEdgeEnd.dist) / Math.max(10, edgeRef * 0.72), -1, 1);

      let enemyPunishChance = 0;
      let laneThreat = 0;
      for (const opp of livingOpp){
        const meta = enemyMeta.get(opp);
        const pred = meta.pred;
        const toSelf = normalize(cand.x - pred.x, cand.y - pred.y);
        const attackLen = Math.min(game.maxMoveDist, Math.hypot(cand.x - pred.x, cand.y - pred.y));
        const attackCand = {
          x: pred.x + toSelf.x * attackLen,
          y: pred.y + toSelf.y * attackLen
        };
        const punishEval = estimateKOCandidateChance(
          opp,
          attackCand,
          a,
          { pred: { x: cand.x, y: cand.y }, eEdge: selfEdgeEnd },
          toSelf,
          attackLen
        );
        enemyPunishChance = Math.max(enemyPunishChance, punishEval.chance * (0.72 + meta.intentMag * 0.28));

        if (opp.target && meta.intentMag > 0.08){
          const lane = pointSegData(opp.x, opp.y, opp.target.x, opp.target.y, cand.x, cand.y);
          const laneR = a.r + opp.r + 16;
          laneThreat = Math.max(laneThreat, clamp(1 - Math.sqrt(lane.d2) / laneR, 0, 1) * (0.66 + meta.intentMag * 0.34));
        }
      }

      let stageHazard = 0;
      if (bridges){
        const bridge = bridgeChoiceFor(cand.y, cand.y);
        const onBridge = bridge && cand.x >= bridge.x && cand.x <= (bridge.x + bridge.w);
        if (onBridge){
          const railDist = Math.min(cand.y - bridge.y, bridge.y + bridge.h - cand.y);
          stageHazard = Math.max(stageHazard, clamp(1 - railDist / Math.max(16, bridge.h * 0.28), 0, 1));
        } else {
          const side = bridgeSideFor(cand.x);
          if (side !== "bridge"){
            const trenchGap = Math.min(Math.abs(cand.x - bridges.pitX), Math.abs(cand.x - (bridges.pitX + bridges.pitW)));
            stageHazard = Math.max(stageHazard, clamp(1 - trenchGap / Math.max(22, a.r + 20), 0, 1) * 0.72);
          }
        }
      }

      const chance = clamp(
        edgePressure * 0.34 +
        outwardSelf * 0.18 +
        Math.max(0, edgeWorsen) * 0.08 +
        enemyPunishChance * 0.28 +
        laneThreat * 0.08 +
        stageHazard * 0.04,
        0, 1
      );
      return { chance, edgePressure, outwardSelf, edgeWorsen, enemyPunishChance, laneThreat, stageHazard };
    };

    let finisherEnemy = livingOpp[0];
    let disruptorEnemy = livingOpp[0];
    let finisherScore = -1e9;
    let disruptorScore = -1e9;
    for (const opp of livingOpp){
      const meta = enemyMeta.get(opp);
      if (meta.vulnerability > finisherScore){
        finisherScore = meta.vulnerability;
        finisherEnemy = opp;
      }
      if (meta.danger > disruptorScore){
        disruptorScore = meta.danger;
        disruptorEnemy = opp;
      }
    }

    let allyAtRisk = livingAI[0];
    let allyRiskDist = Infinity;
    for (const a of livingAI){
      const e = edgeInfoFor(a, a.x, a.y);
      if (e.dist < allyRiskDist){
        allyRiskDist = e.dist;
        allyAtRisk = a;
      }
    }

    const personalityFor = new Map();
    const personalityProfileFor = (u) => {
      const key = personalityFor.get(u) || "STANDARD";
      return AI_PERSONALITY_PROFILES[key] || AI_PERSONALITY_PROFILES.STANDARD;
    };
    if (!isEasy){
      const pattern = isHard ? HARD_PERSONALITY_PATTERN : NORMAL_PERSONALITY_PATTERN;
      for (const a of livingAI){
        const slot = Math.max(0, game.team2.indexOf(a));
        const personalityKey = pattern[slot % pattern.length] || "BALANCED";
        personalityFor.set(a, personalityKey);
        a.aiPersonality = personalityKey;
      }
    }

    const roleFor = new Map();
    if (coordStrength < 0.20){
      for (const a of livingAI) roleFor.set(a, "hunter");
    } else {
      const chooseClosestUnit = (units, tx, ty, excludeSet=null) => {
        let best = null;
        let bestD = Infinity;
        for (const u of units){
          if (excludeSet && excludeSet.has(u)) continue;
          const d = Math.hypot(u.x - tx, u.y - ty);
          if (d < bestD){
            bestD = d;
            best = u;
          }
        }
        return best;
      };
      const finPred = enemyMeta.get(finisherEnemy).pred;
      const aggressiveUnits = livingAI.filter(a => personalityProfileFor(a).name === "aggressive");
      const predictorUnits = livingAI.filter(a => personalityProfileFor(a).name === "predictor");
      const defenderUnits = livingAI.filter(a => personalityProfileFor(a).name === "defender");

      let finisherUnit = chooseClosestUnit(aggressiveUnits.length ? aggressiveUnits : livingAI, finPred.x, finPred.y) || livingAI[0];
      roleFor.set(finisherUnit, "finisher");

      const disPred = enemyMeta.get(disruptorEnemy).pred;
      const taken = new Set([finisherUnit]);
      const disruptorUnit = chooseClosestUnit(
        predictorUnits.length ? predictorUnits : livingAI,
        disPred.x, disPred.y,
        taken
      );
      if (disruptorUnit) roleFor.set(disruptorUnit, "disruptor");
      if (disruptorUnit) taken.add(disruptorUnit);

      const supportAnchor = allyAtRisk || livingAI[0];
      const supportUnit = chooseClosestUnit(
        defenderUnits.length ? defenderUnits : livingAI,
        supportAnchor.x, supportAnchor.y,
        taken
      );
      if (supportUnit) roleFor.set(supportUnit, "support");

      for (const a of livingAI){
        if (roleFor.has(a)) continue;
        const personality = personalityProfileFor(a).name;
        if (personality === "aggressive") roleFor.set(a, "finisher");
        else if (personality === "predictor") roleFor.set(a, "disruptor");
        else roleFor.set(a, "support");
      }
    }
    const enemyClaims = new Map();
    const reservedSpots = [];
    const LOW_COMMIT_TAGS = new Set([
      "center_hold",
      "bodyguard",
      "bodyguard_hold",
      "protect_lane",
      "door_guard",
      "bridge_guard",
      "bridge_entry",
      "bridge_center",
      "door_center",
      "fallback"
    ]);
    const commitFloorFor = (u, tag, focusEnemy) => {
      if (!focusEnemy || LOW_COMMIT_TAGS.has(tag)) return 0;
      const personality = personalityProfileFor(u);
      if (personality.name === "aggressive") return isHard ? 0.88 : isNormal ? 0.76 : 0;
      if (personality.name === "predictor") return isHard ? 0.80 : isNormal ? 0.66 : 0;
      if (personality.name === "balanced") return isHard ? 0.74 : isNormal ? 0.58 : 0;
      if (personality.name === "defender") return isHard ? 0.68 : isNormal ? 0.54 : 0;
      return isHard ? 0.72 : isNormal ? 0.56 : 0;
    };

    const pickAssignedEnemy = (a, role) => {
      const personality = personalityProfileFor(a);
      let best = finisherEnemy;
      let bestScore2 = -1e9;
      for (const opp of livingOpp){
        const meta = enemyMeta.get(opp);
        const pred = meta.pred;
        const d = Math.hypot(pred.x - a.x, pred.y - a.y);
        const directVec = normalize(pred.x - a.x, pred.y - a.y);
        const probeCand = {
          x: a.x + directVec.x * game.maxMoveDist,
          y: a.y + directVec.y * game.maxMoveDist
        };
        const koProbe = estimateKOCandidateChance(a, probeCand, opp, meta, directVec, game.maxMoveDist);
        let s = meta.vulnerability * 42 * personality.assignVulnerability +
          meta.danger * 34 * personality.assignDanger +
          (1 - clamp(d / (game.maxMoveDist * 1.6), 0, 1)) * 28;
        if (isHard || personality.predict > 1.08){
          s += meta.intentMag * 18 * personality.predict;
          const toThreat = Math.hypot(meta.intentEnd.x - a.x, meta.intentEnd.y - a.y);
          s += (1 - clamp(toThreat / (game.maxMoveDist * 1.35), 0, 1)) * 14 * personality.predict;
        }
        if (role === "finisher") s += meta.vulnerability * 56 * personality.finish;
        else if (role === "disruptor") s += meta.danger * 52 * Math.max(personality.predict, personality.assignDanger);
        else s += (1 - meta.vulnerability) * 8 * personality.protect;
        s += koProbe.chance * (isHard ? 62 : isNormal ? 34 : 16) * personality.finish;
        if (isHard){
          const safeAnchor = safeAnchorFor(opp);
          const recoveryDist = Math.hypot(meta.intentEnd.x - safeAnchor.x, meta.intentEnd.y - safeAnchor.y);
          s += (1 - clamp(recoveryDist / (game.maxMoveDist * 1.55), 0, 1)) * 16 * personality.predict;
          s += meta.intentMag * 10 * personality.predict;
        }
        if (personality.name === "defender" && allyAtRisk){
          const threatLane = Math.hypot(pred.x - allyAtRisk.x, pred.y - allyAtRisk.y);
          s += (1 - clamp(threatLane / (game.maxMoveDist * 1.55), 0, 1)) * 24;
        }
        const claims = enemyClaims.get(enemyIds.get(opp)) || 0;
        s -= claims * (5 + coordStrength * 22) * personality.claim;
        if (s > bestScore2){
          bestScore2 = s;
          best = opp;
        }
      }
      return best;
    };

    const addCandidate = (list, u, x, y, focusEnemy, tag, minSep=8) => {
      let tx = x;
      let ty = y;
      const mdx = tx - u.x;
      const mdy = ty - u.y;
      const mlen = Math.hypot(mdx, mdy) || 1;
      const commitFloor = commitFloorFor(u, tag, focusEnemy);
      if (mlen > 1 && commitFloor > 0 && mlen < game.maxMoveDist * commitFloor){
        const s = (game.maxMoveDist * commitFloor) / mlen;
        tx = u.x + mdx * s;
        ty = u.y + mdy * s;
      }
      if (mlen > game.maxMoveDist){
        const s = game.maxMoveDist / mlen;
        tx = u.x + mdx * s;
        ty = u.y + mdy * s;
      }

      let safe = clampPointToPlatformForUnit(u, tx, ty);
      if (isBridgesStage() && segmentBlockedByPitForUnit(u, u.x, u.y, safe.x, safe.y)){
        const route = getBridgeRoutePoint(u, u.x, u.y, safe.x, safe.y);
        if (route) safe = { x: route.x, y: route.y };
      }
      if (isDoorsStage() && segmentBlockedByWallsForUnit(u, u.x, u.y, safe.x, safe.y, buildDoorsWallsForHalf(projectedDoorHalf))){
        const route = getDoorsRoutePoint(u, safe.x, safe.y, projectedDoorHalf, p);
        if (route) safe = { x: route.x, y: route.y };
      }
      safe = findAIMoveTarget(u, safe.x, safe.y);
      safe = applyAICircleSafety(u, safe, diff);
      safe = applyAIDoorsSafety(u, safe, diff);

      for (const c of list){
        if (Math.hypot(c.x - safe.x, c.y - safe.y) < minSep) return false;
      }
      list.push({ x: safe.x, y: safe.y, focusEnemy, tag });
      return true;
    };

    const buildCandidates = (a, role, assignedEnemy) => {
      const personality = personalityProfileFor(a);
      const out = [];
      const ap = enemyMeta.get(assignedEnemy).pred;
      const am = enemyMeta.get(assignedEnemy);
      const av = normalize(ap.x - a.x, ap.y - a.y);
      const perp = { x: -av.y, y: av.x };

      const clutchAttackBoost = 1 + knockoutClutchAggro * 0.22;
      const attackFar = game.maxMoveDist * clamp((0.78 + diff.pressure * 0.12) * aiMod.attackDistMul * clutchAttackBoost, 0.64, 0.98);
      const attackMid = game.maxMoveDist * clamp((0.48 + diff.fastShotBias * 0.16) * aiMod.attackDistMul * (1 + knockoutClutchAggro * 0.20), 0.36, 0.74);
      addCandidate(out, a, a.x + av.x * attackFar * personality.attack, a.y + av.y * attackFar * personality.attack, assignedEnemy, "direct_far");
      addCandidate(out, a, a.x + av.x * attackMid * personality.attack, a.y + av.y * attackMid * personality.attack, assignedEnemy, "direct_mid");
      if (isHard || personality.predict > 1.08){
        if (assignedEnemy.target && am.intentMag > 0.12){
          const lead = clamp(0.52 + (personality.predict - 1) * 0.22, 0.46, 0.72);
          const ix = lerp(am.pred.x, am.intentEnd.x, lead);
          const iy = lerp(am.pred.y, am.intentEnd.y, lead);
          const behind = (a.r + assignedEnemy.r) * 0.62 + 9;
          addCandidate(out, a, ix - am.intentDir.x * behind, iy - am.intentDir.y * behind, assignedEnemy, "counter_lane");

          const sideSign = ((enemyIds.get(assignedEnemy) || 0) % 2 === 0) ? 1 : -1;
          const sideX = -am.intentDir.y * sideSign;
          const sideY = am.intentDir.x * sideSign;
          const shoulder = a.r + assignedEnemy.r + 13;
          addCandidate(out, a, ix + sideX * shoulder, iy + sideY * shoulder, assignedEnemy, "counter_shoulder");
          if (personality.name === "aggressive"){
            const allInX = am.intentEnd.x + am.intentDir.x * (game.maxMoveDist * 0.22 + assignedEnemy.r * 0.6);
            const allInY = am.intentEnd.y + am.intentDir.y * (game.maxMoveDist * 0.22 + assignedEnemy.r * 0.6);
            addCandidate(out, a, allInX, allInY, assignedEnemy, "all_in_predict");
          }
          if (personality.name === "predictor"){
            addCandidate(out, a, lerp(ix, am.intentEnd.x, 0.42), lerp(iy, am.intentEnd.y, 0.42), assignedEnemy, "predict_cut");
          }
        }
      }

      if (bridges){
        const mySide = bridgeSideFor(a.x);
        const enemySide = am.bridgeSide;
        const crossBridge = bridgeChoiceFor(a.y, ap.y);
        if (crossBridge){
          const myApproach = bridgeMouthPoint(mySide === "right" ? "right" : "left", crossBridge, a.r + 10);
          const farApproach = bridgeMouthPoint(enemySide === "left" ? "left" : "right", crossBridge, a.r + 10);

          if (mySide !== enemySide && mySide !== "bridge" && enemySide !== "bridge"){
            const route = routeViaBridge(a, ap.x, ap.y);
            addCandidate(out, a, route.x, route.y, assignedEnemy, "bridge_cross");
            addCandidate(out, a, myApproach.x, myApproach.y, assignedEnemy, "bridge_entry");
            if (isHard){
              addCandidate(out, a, farApproach.x, farApproach.y, assignedEnemy, "bridge_exit_pressure");
            }
          } else if (enemySide === "bridge" || (assignedEnemy.target && am.intentMag > 0.10)){
            addCandidate(out, a, myApproach.x, myApproach.y, assignedEnemy, "bridge_guard");
            if (isHard){
              const centerX = crossBridge.x + crossBridge.w * 0.5;
              const centerY = crossBridge.y + crossBridge.h * 0.5;
              addCandidate(out, a, centerX, centerY, assignedEnemy, "bridge_center");
              if (enemySide !== "bridge"){
                addCandidate(out, a, farApproach.x, farApproach.y, assignedEnemy, "bridge_trap");
              }
            }
          }
        }
      }
      if (doors){
        const mySide = (a.x < p.cx) ? "LEFT" : "RIGHT";
        const enemySide = (ap.x < p.cx) ? "LEFT" : "RIGHT";
        const sideSign = (mySide === "LEFT") ? -1 : 1;
        const entryX = p.cx + sideSign * (doors.channelW * 0.5 + a.r + 12);
        const farX = p.cx - sideSign * (doors.channelW * 0.5 + a.r + 12);
        const route = routeViaDoor(a, ap.x, ap.y);

        addCandidate(out, a, route.x, route.y, assignedEnemy, "door_route");
        addCandidate(out, a, entryX, doorLaneCenter.y, assignedEnemy, "door_guard");

        if (isHard){
          addCandidate(out, a, farX, doorLaneCenter.y, assignedEnemy, "door_trap");
          if (enemySide !== mySide){
            addCandidate(out, a, p.cx, doorLaneCenter.y, assignedEnemy, "door_center");
          }
        }
      }

      if (assignedEnemy.target){
        const lp = clamp(0.18 + lookahead * 0.42 * personality.predict, 0.18, 0.80);
        const leadX = lerp(ap.x, assignedEnemy.target.x, lp);
        const leadY = lerp(ap.y, assignedEnemy.target.y, lp);
        addCandidate(out, a, leadX, leadY, assignedEnemy, "intercept");
        if (isHard){
          const safeAnchor = safeAnchorFor(assignedEnemy);
          const denyX = lerp(am.intentEnd.x, safeAnchor.x, 0.32);
          const denyY = lerp(am.intentEnd.y, safeAnchor.y, 0.32);
          addCandidate(out, a, denyX, denyY, assignedEnemy, "escape_deny");
        }
      }

      if (personality.name !== "aggressive"){
        const flankDist = a.r * 2.8 + 16;
        addCandidate(out, a, ap.x + perp.x * flankDist - av.x * 12, ap.y + perp.y * flankDist - av.y * 12, assignedEnemy, "flank_up");
        addCandidate(out, a, ap.x - perp.x * flankDist - av.x * 12, ap.y - perp.y * flankDist - av.y * 12, assignedEnemy, "flank_down");
      }

      if (role === "finisher"){
        const em = enemyMeta.get(assignedEnemy);
        addCandidate(
          out, a,
          ap.x + em.eEdge.nx * game.maxMoveDist * 0.34,
          ap.y + em.eEdge.ny * game.maxMoveDist * 0.34,
          assignedEnemy, "finish_edge"
        );
        if (isHard && (em.vulnerability > 0.44 || em.danger > 0.54)){
          addCandidate(
            out, a,
            ap.x + em.eEdge.nx * game.maxMoveDist * 0.52 + em.intentDir.x * 12,
            ap.y + em.eEdge.ny * game.maxMoveDist * 0.52 + em.intentDir.y * 12,
            assignedEnemy, "kill_confirm"
          );
        }
      } else if (role === "disruptor"){
        if (assignedEnemy.target){
          addCandidate(
            out, a,
            lerp(ap.x, assignedEnemy.target.x, 0.42),
            lerp(ap.y, assignedEnemy.target.y, 0.42),
            assignedEnemy, "lane_cut"
          );
        }
      } else {
        const threatPred = enemyMeta.get(disruptorEnemy).pred;
        const ax = allyAtRisk ? allyAtRisk.x : p.cx;
        const ay = allyAtRisk ? allyAtRisk.y : p.cy;
        addCandidate(
          out, a,
          lerp(threatPred.x, ax, 0.44),
          lerp(threatPred.y, ay, 0.44),
          disruptorEnemy, "protect_lane"
        );
      }
      if (personality.name === "defender" && allyAtRisk){
        const threatPred = enemyMeta.get(disruptorEnemy).pred;
        const coverX = lerp(threatPred.x, allyAtRisk.x, 0.68);
        const coverY = lerp(threatPred.y, allyAtRisk.y, 0.68);
        addCandidate(out, a, coverX, coverY, disruptorEnemy, "bodyguard");
        const away = normalize(allyAtRisk.x - threatPred.x, allyAtRisk.y - threatPred.y);
        addCandidate(
          out, a,
          allyAtRisk.x + away.x * (a.r * 2.6 + 10),
          allyAtRisk.y + away.y * (a.r * 2.6 + 10),
          disruptorEnemy, "bodyguard_hold"
        );
      } else if (personality.name === "aggressive"){
        addCandidate(
          out, a,
          ap.x + av.x * (game.maxMoveDist * 0.22),
          ap.y + av.y * (game.maxMoveDist * 0.22),
          assignedEnemy, "pressure_finish"
        );
      }

      addCandidate(
        out, a,
        p.cx + rand(-p.w * 0.10, p.w * 0.10),
        p.cy + rand(-p.h * 0.10, p.h * 0.10),
        null, "center_hold"
      );

      const baseA = Math.atan2(ap.y - a.y, ap.x - a.x);
      const maxProbeAttempts = Math.max(80, candidatesCount * 12);
      let probeAttempts = 0;
      while (out.length < candidatesCount && probeAttempts < maxProbeAttempts){
        probeAttempts++;
        const ang = baseA + rand(-1.7, 1.7) * (0.55 + randomness * 0.95);
        const dist = game.maxMoveDist * rand(diff.distMin, diff.distMax);
        const added = addCandidate(out, a, a.x + Math.cos(ang) * dist, a.y + Math.sin(ang) * dist, assignedEnemy, "probe");

        // Late-stage fallback: relax spacing so we can always finish candidate generation.
        if (!added && probeAttempts > maxProbeAttempts * 0.7){
          const rx = a.x + rand(-game.maxMoveDist, game.maxMoveDist);
          const ry = a.y + rand(-game.maxMoveDist, game.maxMoveDist);
          addCandidate(out, a, rx, ry, assignedEnemy, "probe_relaxed", 3);
        }
      }

      if (out.length === 0){
        addCandidate(out, a, p.cx, p.cy, assignedEnemy, "fallback", 0);
      }
      return out;
    };

    const scoreCandidate = (a, cand, role, assignedEnemy) => {
      const personality = personalityProfileFor(a);
      const moveX = cand.x - a.x;
      const moveY = cand.y - a.y;
      const moveLen = Math.hypot(moveX, moveY) || 1;
      const moveDir = { x: moveX / moveLen, y: moveY / moveLen };

      const selfEdge = edgeInfoFor(a, cand.x, cand.y);
      const selfRisk = clamp((edgeRef - selfEdge.dist) / edgeRef, 0, 1);
      const outwardSelf = Math.max(0, (moveX * selfEdge.nx + moveY * selfEdge.ny) / Math.max(1, game.maxMoveDist));
      const selfKOEval = estimateSelfKOCandidateChance(a, cand, moveDir, moveLen);

      let score = 0;
      const clutchRiskCut = 1 - knockoutClutchAggro * 0.42;
      const bridgeRiskMul = bridges ? 1.34 : 1;
      const selfRiskPenalty = (30 + 34 * coordStrength) * selfRisk * aiMod.riskPenaltyMul * clutchRiskCut * bridgeRiskMul * personality.risk;
      const outwardPenalty = (20 + 28 * coordStrength) * outwardSelf * aiMod.riskPenaltyMul * clutchRiskCut * bridgeRiskMul * personality.risk;
      score -= selfRiskPenalty;
      score -= outwardPenalty;
      score -= selfKOEval.chance * (isHard ? 108 : isNormal ? 56 : 24) * personality.risk;
      if (selfKOEval.chance >= (isHard ? 0.34 : isNormal ? 0.46 : 0.62)){
        score -= selfKOEval.chance * (isHard ? 88 : isNormal ? 42 : 18) * personality.risk;
      }
      score += (role === "support" ? 13 : 8) * centerScore(a, cand.x, cand.y) * personality.center * (1 - knockoutClutchAggro * 0.55);
      score += centerScore(a, cand.x, cand.y) * aiMod.centerBias * 18 * personality.center;

      const assignedMeta = enemyMeta.get(assignedEnemy);
      const assignedPred = enemyMeta.get(assignedEnemy).pred;
      const assignedDist = Math.hypot(cand.x - assignedPred.x, cand.y - assignedPred.y);
      score += clamp(1 - assignedDist / (game.maxMoveDist * 1.05), 0, 1) *
        (role === "finisher" ? 20 * personality.attack : role === "disruptor" ? 16 * personality.predict : 11 * personality.protect);
      const commitFloor = commitFloorFor(a, cand.tag, cand.focusEnemy);
      if (commitFloor > 0){
        const commitFrac = clamp(moveLen / Math.max(1, game.maxMoveDist), 0, 1);
        const shortfall = clamp((commitFloor - commitFrac) / Math.max(0.08, commitFloor), 0, 1);
        score -= shortfall * (isHard ? 22 : isNormal ? 12 : 0) * personality.pressure;
        score += Math.max(0, commitFrac - commitFloor) * (isHard ? 16 : isNormal ? 8 : 0) * personality.pressure;
      }
      if (isHard || personality.laneBlock > 1.08){
        const am = enemyMeta.get(assignedEnemy);
        if (assignedEnemy.target && am.intentMag > 0.08){
          const lane = pointSegData(assignedEnemy.x, assignedEnemy.y, assignedEnemy.target.x, assignedEnemy.target.y, cand.x, cand.y);
          const laneR = a.r + assignedEnemy.r + 20;
          const laneBlock = clamp(1 - Math.sqrt(lane.d2) / laneR, 0, 1);
          score += laneBlock * (12 + 18 * diff.intercept) * personality.laneBlock;
        }
      }
      // Discourage hard reversals; prefer engage or sidestep unless safety is critical.
      const towardAssigned = normalize(assignedPred.x - a.x, assignedPred.y - a.y);
      const engageDot = moveDir.x * towardAssigned.x + moveDir.y * towardAssigned.y;
      const retreatAllowance = clamp((selfRisk - 0.55) / 0.45, 0, 1);
      if (engageDot < -0.12){
        const antiReverse = (0.12 - engageDot) * (24 + 36 * coordStrength) * (1 - retreatAllowance * 0.72) * (1 + knockoutClutchAggro * 0.24);
        score -= antiReverse;
      }
      if (isHard){
        if (cand.tag === "finish_edge") score += 12;
        else if (cand.tag === "kill_confirm") score += 20;
        else if (cand.tag === "direct_far") score += 15;
        else if (cand.tag === "intercept") score += 12;
        else if (cand.tag === "escape_deny") score += 14;
        else if (cand.tag === "direct_mid") score += 8;
        else if (cand.tag === "counter_lane") score += 10;
        else if (cand.tag === "all_in_predict") score += 18;
        else if (cand.tag === "center_hold") score -= 8;
      }
      if (personality.name === "aggressive"){
        if (cand.tag === "all_in_predict") score += 34;
        if (cand.tag === "direct_far" || cand.tag === "finish_edge" || cand.tag === "kill_confirm" || cand.tag === "pressure_finish") score += 22;
        if (cand.tag === "intercept") score += 16;
        if (cand.tag === "direct_mid" || cand.tag === "counter_lane") score += 12;
        if (cand.tag === "counter_shoulder" || cand.tag === "center_hold") score -= 16;
        if (cand.tag === "protect_lane" || cand.tag === "bodyguard" || cand.tag === "bodyguard_hold") score -= 24;
      } else if (personality.name === "defender"){
        if (cand.tag === "protect_lane" || cand.tag === "bodyguard" || cand.tag === "bodyguard_hold") score += 18;
        if (cand.tag === "door_guard" || cand.tag === "bridge_guard") score += 16;
        if (cand.tag === "center_hold") score += 4;
      } else if (personality.name === "predictor"){
        if (cand.tag === "intercept" || cand.tag === "counter_lane" || cand.tag === "counter_shoulder" || cand.tag === "predict_cut") score += 18;
        if (cand.tag === "escape_deny") score += 16;
        if (cand.tag === "door_route" || cand.tag === "bridge_trap") score += 12;
      } else if (personality.name === "balanced"){
        if (cand.tag === "flank_up" || cand.tag === "flank_down" || cand.tag === "lane_cut") score += 8;
      }
      if (isHard && cand.tag === "escape_deny" && assignedEnemy.target){
        const safeAnchor = safeAnchorFor(assignedEnemy);
        const lane = pointSegData(assignedMeta.intentEnd.x, assignedMeta.intentEnd.y, safeAnchor.x, safeAnchor.y, cand.x, cand.y);
        const denyR = a.r + assignedEnemy.r + 18;
        score += clamp(1 - Math.sqrt(lane.d2) / denyR, 0, 1) * 22;
      }
      if (bridges){
        const candSide = bridgeSideFor(cand.x);
        const enemySide = assignedMeta.bridgeSide;
        const controlBridge = assignedMeta.targetBridge || bridgeChoiceFor(cand.y, assignedPred.y);
        if (controlBridge){
          const bridgeCY = controlBridge.y + controlBridge.h * 0.5;
          const bridgeBand = Math.abs(cand.y - bridgeCY);
          const bridgeProx = clamp(1 - bridgeBand / Math.max(40, controlBridge.h * 0.9), 0, 1);
          const mouthDist = Math.min(
            Math.hypot(cand.x - controlBridge.x, cand.y - bridgeCY),
            Math.hypot(cand.x - (controlBridge.x + controlBridge.w), cand.y - bridgeCY)
          );
          const mouthProx = clamp(1 - mouthDist / Math.max(40, game.maxMoveDist * 0.34), 0, 1);

          if (enemySide === "bridge"){
            score += mouthProx * (role === "finisher" ? 34 : 24);
            if (cand.tag === "bridge_guard" || cand.tag === "bridge_trap" || cand.tag === "bridge_center"){
              score += 18 + bridgeProx * 16;
            }
          } else if (candSide !== enemySide && candSide !== "bridge"){
            score += mouthProx * (role === "support" ? 10 : 16);
          }
          if (cand.tag === "bridge_cross"){
            const routeBonus = (bridgeSideFor(a.x) !== enemySide) ? 26 : 10;
            score += (routeBonus + bridgeProx * 10) * personality.pressure;
          } else if (cand.tag === "bridge_entry"){
            score += (14 + mouthProx * 12) * personality.guard;
          } else if (cand.tag === "bridge_exit_pressure"){
            score += isHard ? 18 + mouthProx * 14 : 0;
          } else if (cand.tag === "bridge_trap"){
            score += isHard ? (28 + mouthProx * 16 + bridgeProx * 14) * personality.predict : 0;
          } else if (cand.tag === "bridge_guard"){
            score += (16 + bridgeProx * 12) * personality.guard;
          } else if (cand.tag === "bridge_center"){
            score += isHard ? 14 + bridgeProx * 10 : 0;
          }
        }
        if (candSide === "bridge"){
          const activeBridge = controlBridge || bridgeChoiceFor(cand.y, cand.y);
          if (activeBridge){
            const railDist = Math.min(cand.y - activeBridge.y, activeBridge.y + activeBridge.h - cand.y);
            const railRisk = clamp(1 - railDist / Math.max(16, activeBridge.h * 0.28), 0, 1);
            score -= railRisk * (isHard ? 34 : 22);
          }
          if (cand.tag === "bridge_center") score -= 10;
        }
      }
      if (doors){
        const laneBand = Math.abs(cand.y - doorLaneCenter.y);
        const laneProx = clamp(1 - laneBand / Math.max(48, p.h * 0.18), 0, 1);
        const targetNeedsLane = assignedMeta.intentDoorHalf !== projectedDoorHalf;
        if (cand.tag === "door_route"){
          score += (22 + laneProx * 12) * Math.max(personality.predict, 1);
        } else if (cand.tag === "door_guard"){
          score += (18 + laneProx * 16) * personality.guard;
        } else if (cand.tag === "door_trap"){
          score += isHard ? (28 + laneProx * 18) * personality.predict : 0;
        } else if (cand.tag === "door_center"){
          score += isHard ? 16 + laneProx * 10 : 0;
        }
        if (targetNeedsLane){
          score += laneProx * (isHard ? 24 : 10);
        }
        if (Math.abs(cand.x - p.cx) < doors.channelW * 0.85 && Math.abs(cand.y - doorLaneCenter.y) > doors.topOpen.h * 0.46){
          score -= 26;
        }
      }

      let maxKOPotential = 0;
      let maxKOChance = 0;
      for (const opp of livingOpp){
        const meta = enemyMeta.get(opp);
        const koEval = estimateKOCandidateChance(a, cand, opp, meta, moveDir, moveLen);
        if (koEval.chance <= 0) continue;
        const towardOut = koEval.towardOut;
        const edgeSwing = koEval.edgeSwing;
        const koPotential = koEval.koPotential;
        const koChance = koEval.chance;
        maxKOPotential = Math.max(maxKOPotential, koPotential);
        maxKOChance = Math.max(maxKOChance, koChance);

        let hitScore = 14 + towardOut * 46 + edgeSwing * 34 + meta.vulnerability * 28;
        hitScore += koPotential * (isHard ? 205 : isNormal ? 82 : 48);
        hitScore += koChance * (isHard ? 88 : isNormal ? 42 : 18);
        hitScore += knockoutClutchAggro * (22 + 28 * koPotential + 10 * towardOut);
        if (opp === finisherEnemy) hitScore += 12;
        if (role === "disruptor" && opp === disruptorEnemy) hitScore += 10;
        if (meta.vulnerability > 0.58) hitScore += 9 * meta.vulnerability;
        score += hitScore * aiMod.koCommitMul * personality.attack;
      }

      const highKOThreshold = isHard ? 0.42 : isNormal ? 0.58 : 0.76;
      if (maxKOChance >= highKOThreshold){
        score += (isHard ? 86 : isNormal ? 42 : 16) * maxKOChance * personality.finish;
      }
      const koAdvantage = maxKOChance - selfKOEval.chance;
      if (isHard){
        score += Math.max(0, koAdvantage) * 78 * personality.finish;
        score -= Math.max(0, -koAdvantage) * 36 * personality.risk;
      } else if (isNormal){
        score += Math.max(0, koAdvantage) * 28 * personality.finish;
      }

      // Allow calculated risk-taking when a probable killshot exists.
      const riskOverride = clamp(
        Math.max(maxKOPotential, maxKOChance * (isHard ? 1.0 : 0.82)) *
          ((isHard ? 0.98 : isNormal ? 0.58 : 0.26) + knockoutClutchAggro * 0.32),
        0, 0.95
      );
      score += (selfRiskPenalty + outwardPenalty) * riskOverride;

      if ((role === "support" || role === "disruptor") && allyAtRisk){
        const threat = enemyMeta.get(disruptorEnemy).pred;
        const lane = pointSegData(threat.x, threat.y, allyAtRisk.x, allyAtRisk.y, cand.x, cand.y);
        const laneR = a.r + 26;
        score += clamp(1 - Math.sqrt(lane.d2) / laneR, 0, 1) * (9 + 24 * coordStrength) * personality.protect;
      }
      if (isHard){
        // Penalize ending inside obvious incoming enemy lines unless we are actively engaging.
        for (const opp of livingOpp){
          const om = enemyMeta.get(opp);
          if (!opp.target || om.intentMag <= 0.12) continue;
          const lane = pointSegData(opp.x, opp.y, opp.target.x, opp.target.y, cand.x, cand.y);
          const laneR = a.r + opp.r + 16;
          const inLane = clamp(1 - Math.sqrt(lane.d2) / laneR, 0, 1);
          if (inLane <= 0) continue;
          const engage = normalize(opp.x - a.x, opp.y - a.y);
          const engageDot2 = moveDir.x * engage.x + moveDir.y * engage.y;
          const lanePenalty = inLane * (8 + 12 * om.intentMag) * (engageDot2 < 0.10 ? 1.0 : 0.35);
          score -= lanePenalty;
        }
      }

      const spacingR = a.r * 4 + 30;
      for (const r of reservedSpots){
        const d = Math.hypot(cand.x - r.x, cand.y - r.y);
        if (d < spacingR){
          score -= (1 - d / spacingR) * (10 + 34 * spacingStrength);
        }
      }

      if (cand.focusEnemy){
        const cid = enemyIds.get(cand.focusEnemy);
        const claims = enemyClaims.get(cid) || 0;
        score -= claims * (coordStrength < 0.24 ? 4 : (8 + 26 * spacingStrength)) * personality.claim;
      }
      if (personality.name === "aggressive"){
        score += Math.max(0, engageDot) * 20;
      }

      cand.koChance = maxKOChance;
      cand.riskChance = selfKOEval.chance;

      const noise = (8 + diff.aimJitter * 0.12) * randomness;
      score += rand(-noise, noise);
      return score;
    };

    const unitPotential = (a) => {
      const personality = personalityProfileFor(a);
      let best = -1e9;
      for (const opp of livingOpp){
        const meta = enemyMeta.get(opp);
        const d = Math.hypot(meta.pred.x - a.x, meta.pred.y - a.y);
        let s = meta.vulnerability * 56 + meta.danger * 44 +
          (1 - clamp(d / (game.maxMoveDist * 1.7), 0, 1)) * 26;
        if (roleFor.get(a) === "finisher" && opp === finisherEnemy) s += 18;
        if (roleFor.get(a) === "disruptor" && opp === disruptorEnemy) s += 14;
        s *= (roleFor.get(a) === "support") ? personality.protect : personality.attack;
        if (s > best) best = s;
      }
      const selfEdge = edgeInfoFor(a, a.x, a.y);
      if (selfEdge.dist < edgeRef * 0.55) best += 6;
      if (personality.name === "defender" && allyAtRisk && a === allyAtRisk) best += 8;
      return best;
    };

      const refineCount = isHard ? 15 : isNormal ? 3 : 0;
      const refineRadius = isHard ? 44 : 22;
    const aiOrder = [...livingAI].sort((a, b) => unitPotential(b) - unitPotential(a));
    for (const a of aiOrder){
      const role = roleFor.get(a) || "hunter";
      const personality = personalityProfileFor(a);
      const assignedEnemy = pickAssignedEnemy(a, role);
      const candidates = buildCandidates(a, role, assignedEnemy);

      let chosen = null;
      let bestScore3 = -1e9;
      for (const cand of candidates){
        const s = scoreCandidate(a, cand, role, assignedEnemy);
        if (s > bestScore3){
          bestScore3 = s;
          chosen = cand;
        }
      }

      // Local refinement for stronger levels: search around best candidate.
      const localRefineCount = Math.max(0, refineCount + personality.refine);
      if (chosen && localRefineCount > 0){
        for (let i = 0; i < localRefineCount; i++){
          const rx = chosen.x + rand(-refineRadius, refineRadius);
          const ry = chosen.y + rand(-refineRadius, refineRadius);
          let safe = clampPointToPlatformForUnit(a, rx, ry);
          safe = findAIMoveTarget(a, safe.x, safe.y);
          safe = applyAICircleSafety(a, safe, diff);
          const rc = { x: safe.x, y: safe.y, focusEnemy: chosen.focusEnemy, tag: "refine" };
          const rs = scoreCandidate(a, rc, role, assignedEnemy);
          if (rs > bestScore3){
            bestScore3 = rs;
            chosen = rc;
          }
        }
      }

      if (!chosen){
        let fallback = findAIMoveTarget(a, p.cx, p.cy);
        fallback = applyAICircleSafety(a, fallback, diff);
        chosen = { x: fallback.x, y: fallback.y, focusEnemy: assignedEnemy };
      }

      a.target = { x: chosen.x, y: chosen.y };
      a.aiDecisionTag = chosen.tag || "fallback";
      a.aiKOChance = Number.isFinite(chosen.koChance) ? chosen.koChance : 0;
      a.aiRiskChance = Number.isFinite(chosen.riskChance) ? chosen.riskChance : 0;
      reservedSpots.push({ x: chosen.x, y: chosen.y });
      if (chosen.focusEnemy){
        const id = enemyIds.get(chosen.focusEnemy);
        enemyClaims.set(id, (enemyClaims.get(id) || 0) + 1);
      }
    }
  }

  function beginResolve(){
    if (game.phase !== "plan") return;

    if (isSinglePlayerMode()){
      if (!allPlansReadyFor(game.team1)) return;
      // AI plans should match the revealed arrows for this turn.
      if (!game.aiPlannedThisTurn){
        aiPlanTargets();
        game.aiPlannedThisTurn = true;
      }
    } else {
      // Two-player mode: both teams must be planned.
      if (!allPlansReadyFor(game.team1) || !allPlansReadyFor(game.team2)) return;
    }

    // Initialize velocities toward targets
    const frames = Math.max(1, game.turnDur * 60);
    const maxLaunchSpeed = getPhysicsTuning().maxMoveSpeed;
    const all = [...game.team1, ...game.team2];
    for (const u of all){
      if (!u.alive || !u.target){ u.vx = u.vy = 0; continue; }
      const dx = u.target.x - u.x;
      const dy = u.target.y - u.y;

      let vx = dx / frames;
      let vy = dy / frames;

      const sp = Math.hypot(vx, vy);
      if (sp > maxLaunchSpeed){
        vx = vx / sp * maxLaunchSpeed;
        vy = vy / sp * maxLaunchSpeed;
      }
      u.vx = vx;
      u.vy = vy;
    }

    game.phase = "resolve";
    game.turnT = 0;
    game.aiPlannedThisTurn = false;

    beep(520, 0.06, "square", 0.04);
  }

  function endRound(winner){
    game.phase = "over";
    game.winner = winner;
    if (winner === "player") game.playerWins++;
    else game.aiWins++;
    const meta = seriesMeta();
    const p1SeriesWon = game.playerWins >= meta.firstTo;
    const p2SeriesWon = game.aiWins >= meta.firstTo;
    game.seriesOver = p1SeriesWon || p2SeriesWon;
    game.seriesWinner = game.seriesOver ? (p1SeriesWon ? "player" : "ai") : null;
    recordMapUnlockProgress();
    maybeUnlockBridgesStage();
    maybeUnlockDoorsStage();

    winSound();

    setTimeout(() => {
      if (state === State.GAME || state === State.PAUSE){
        state = State.WIN;
        ui.buttons = [];
      }
    }, 250);
  }
